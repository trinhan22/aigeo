<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://i.ibb.co/JWTx6WrX/FAVICON.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGEO - Xem trước Đề thi</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/main.css">
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Rendering Engines -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <link rel="stylesheet" href="/src/css/teacher/test-view-teacher.css">
</head>
<body>
    
    <!-- Sidebar (Đồng bộ Menu) -->
    <aside class="sidebar">
        <div class="p-8">
            <a href="/" class="flex items-center gap-3">
                <img src="https://i.ibb.co/JWTx6WrX/FAVICON.png" class="h-9 w-auto">
                <span class="text-xl font-black text-teal-600 tracking-tight">AIGEO</span>
            </a>
        </div>
        <nav class="flex-grow overflow-y-auto">
            <a href="index.html" class="sidebar-link"><i data-feather="grid"></i> Tổng quan</a>
            <div class="nav-group-title">Quản lý</div>
            <a href="classrooms.html" class="sidebar-link"><i data-feather="users"></i> Quản lý Lớp học</a>
            <a href="tests.html" class="sidebar-link active"><i data-feather="file-text"></i> Quản lý đề thi</a>
            <a href="question-bank.html" class="sidebar-link"><i data-feather="database"></i> Ngân hàng câu hỏi</a>
            <div class="nav-group-title">Cá nhân</div>
            <a href="account.html" class="sidebar-link"><i data-feather="user"></i> Tài khoản</a>
        </nav>
        <div class="p-4 border-t">
            <button id="logout-btn" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition">
                <i data-feather="log-out"></i> Đăng xuất
            </button>
        </div>
    </aside>

    <div class="main-layout">
        <!-- Header (Đồng bộ Thanh trên) -->
        <header>
            <div class="flex items-center gap-4">
                <a href="tests.html" class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center border border-slate-100 hover:bg-slate-100 transition text-slate-400">
                    <i data-feather="chevron-left" class="w-5"></i>
                </a>
                <h1 id="test-name-header" class="text-lg font-black text-slate-800 uppercase tracking-tighter truncate max-w-md">Đang tải đề...</h1>
            </div>

            <div class="flex items-center gap-4">
                <a id="edit-btn" href="#" class="px-5 py-2.5 bg-slate-100 text-slate-600 font-extrabold text-[10px] uppercase tracking-widest rounded-xl hover:bg-slate-200 transition">Chỉnh sửa</a>
                <button id="assign-btn" class="cta-button text-[10px] uppercase tracking-widest px-6 py-2.5 shadow-none">Giao bài</button>
                <div class="h-8 w-[1px] bg-slate-100 mx-2"></div>
                <div class="flex items-center gap-4">
                    <div class="text-right hidden sm:block">
                        <p id="user-name" class="text-sm font-black text-slate-800 leading-none">Đang tải...</p>
                        <span class="text-[10px] font-bold text-teal-600 uppercase tracking-tighter">Teacher Account</span>
                    </div>
                    <img id="user-avatar" class="h-10 w-10 rounded-xl border-2 border-slate-100 object-cover shadow-sm">
                </div>
            </div>
        </header>

        <div class="content-workspace">
            <!-- Nội dung câu hỏi -->
            <main id="main-content-scroll">
                <div class="max-w-4xl mx-auto">
                    <div id="main-content-area" class="space-y-8">
                        <!-- Câu hỏi sẽ được load vào đây bởi JS -->
                        <div class="flex flex-col items-center justify-center py-20 text-slate-300 font-bold uppercase tracking-widest text-xs gap-4">
                            <div class="w-10 h-10 border-4 border-teal-500 border-t-transparent rounded-full animate-spin"></div>
                            Nạp nội dung đề thi...
                        </div>
                    </div>
                </div>
            </main>

            <!-- Bản đồ câu hỏi bên phải -->
            <aside id="question-map">
                <h2 class="font-black text-slate-800 text-[10px] uppercase tracking-[0.2em] mb-6">Bản đồ câu hỏi</h2>
                <div id="question-grid" class="grid grid-cols-5 gap-2"></div>
                <div class="mt-auto pt-6 border-t border-slate-50">
                    <button id="show-answer-btn" class="w-full bg-amber-500 text-white font-black py-4 rounded-xl text-[10px] uppercase tracking-widest hover:bg-amber-600 transition shadow-lg shadow-amber-100">Hiển thị đáp án</button>
                </div>
            </aside>
        </div>
    </div>
    
    <!-- Modal Giao bài -->
    <div id="assign-confirm-modal" class="fixed inset-0 z-50 items-center justify-center hidden modal-backdrop p-4">
        <div class="bg-white rounded-[32px] p-8 w-full max-w-lg shadow-2xl">
            <h2 class="text-2xl font-black text-slate-800 mb-2 tracking-tight">Giao bài cho lớp</h2>
            <p id="assign-modal-test-name" class="text-[10px] font-black text-teal-600 uppercase tracking-widest mb-8"></p>
            <div id="classrooms-list" class="space-y-2 max-h-60 overflow-y-auto p-4 bg-slate-50 rounded-2xl border border-slate-100 mb-8">
                <p class="text-slate-400 text-xs font-bold text-center">Đang tải danh sách lớp...</p>
            </div>
            <div class="flex gap-3">
                <button type="button" id="assign-cancel-btn" class="flex-1 py-3 font-bold text-slate-400">Hủy bỏ</button>
                <button type="button" id="assign-confirm-btn" class="flex-1 cta-button justify-center py-3">Xác nhận giao</button>
            </div>
        </div>
    </div>

    <!-- Nút mở Bản đồ câu hỏi cho Mobile -->
    <button id="mobile-map-trigger" class="md:hidden fixed right-5 bottom-[85px] w-14 h-14 bg-teal-600 text-white rounded-full shadow-2xl z-[999] flex items-center justify-center border-4 border-white">
        <i data-feather="grid"></i>
    </button>

    <div id="toast-container" class="fixed bottom-10 right-10 z-[100] flex flex-col gap-3"></div>
    
    <script type="module" src="../firebase-config.js"></script>
    <script type="module" src="/src/js/teacher/test-view-teacher.js"></script>


</body>
</html>
