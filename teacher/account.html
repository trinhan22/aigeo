<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://i.ibb.co/JWTx6WrX/FAVICON.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGEO - Quản lý Tài khoản</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/main.css">
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="/src/css/teacher/account.css">
</head>
<body class="flex h-screen">

    <!-- Sidebar (Đồng bộ) -->
    <aside class="sidebar">
        <div class="p-8">
            <a href="/" class="flex items-center gap-3">
                <img src="https://i.ibb.co/JWTx6WrX/FAVICON.png" class="h-9 w-auto">
                <span class="text-xl font-black text-teal-600 tracking-tight">AIGEO</span>
            </a>
        </div>
        <nav class="flex-grow overflow-y-auto">
            <a href="index.html" class="sidebar-link"><i data-feather="grid"></i> Tổng quan</a>
            <div class="nav-group-title">Quản lý</div>
            <a href="classrooms.html" class="sidebar-link"><i data-feather="users"></i> Quản lý Lớp học</a>
            <a href="tests.html" class="sidebar-link"><i data-feather="file-text"></i> Quản lý đề thi</a>
            <a href="question-bank.html" class="sidebar-link"><i data-feather="database"></i> Ngân hàng câu hỏi</a>
            <div class="nav-group-title">Cá nhân</div>
            <a href="account.html" class="sidebar-link active"><i data-feather="user"></i> Tài khoản</a>
        </nav>
        <div class="p-4 border-t">
            <button id="logout-btn" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition">
                <i data-feather="log-out"></i> Đăng xuất
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- Header -->
        <header class="h-16 bg-white border-b flex items-center justify-between px-8 shrink-0">
            <div class="flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-widest leading-none">
                <a href="index.html" class="hover:text-teal-600 transition">Tổng Quan</a>
                <span>/</span>
                <span class="text-slate-800">Quản Lý Tài Khoản</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p id="user-name-header" class="text-sm font-black text-slate-800 leading-none">Đang tải...</p>
                    <span class="text-[10px] font-bold text-teal-600 uppercase">Teacher Account</span>
                </div>
                <img id="user-avatar" class="h-10 w-10 rounded-xl border-2 border-slate-100 object-cover shadow-sm">
            </div>
        </header>

        <!-- Main Content Area -->
        <div class="flex-1 overflow-y-auto bg-slate-50/50 p-8">
            <div class="max-w-4xl mx-auto space-y-10">
                
                <div>
                    <h1 class="text-4xl font-black mb-4 anime-title">Quản lý Tài khoản</h1>
                    <p class="text-slate-500 font-medium">Cập nhật thông tin cá nhân và cài đặt học tập của bạn.</p>
                </div>

                <div id="toast-container" class="fixed bottom-10 right-10 z-50 flex flex-col gap-3"></div>

                <!-- Profile Form -->
                <div class="bento-card border-l-4 border-l-teal-500">
                    <div class="flex items-center gap-3 mb-8">
                        <div class="w-10 h-10 bg-teal-50 text-teal-600 rounded-xl flex items-center justify-center"><i data-feather="user"></i></div>
                        <h2 class="text-xl font-black text-slate-800">Thông tin cá nhân</h2>
                    </div>

                    <form id="profile-form" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-1">
                                <label class="form-label">Họ và tên giáo viên</label>
                                <input id="profile-name" type="text" class="form-input" placeholder="Nguyễn Văn A" required>
                            </div>
                            <div class="space-y-1">
                                <label class="form-label">Địa chỉ Email (Cố định)</label>
                                <input id="profile-email" type="email" class="form-input" disabled>
                            </div>
                            <div class="space-y-1">
                                <label class="form-label">Đơn vị / Trường công tác</label>
                                <input id="profile-school" type="text" class="form-input" placeholder="THPT Chuyên A" required>
                            </div>
                            <div class="space-y-1">
                                <label class="form-label">Môn học giảng dạy chính</label>
                                <select id="profile-subject" class="form-input" required>
                                    <option value="" disabled>-- Chọn môn học --</option>
                                    <option value="Toán">Toán</option>
                                    <option value="Vật Lí">Vật Lí</option>
                                    <option value="Hoá Học">Hoá Học</option>
                                    <option value="Sinh Học">Sinh Học</option>
                                    <option value="Lịch Sử">Lịch Sử</option>
                                    <option value="GDKT&PL">GDKT & Pháp luật</option>
                                    <option value="Tin Học">Tin Học</option>
                                    <option value="Tiếng Anh">Tiếng Anh</option>
                                    <option value="Địa Lí">Địa Lí</option>
                                    <option value="Ngữ Văn">Ngữ Văn</option>
                                </select>
                            </div>
                        </div>
                        <div class="flex justify-end pt-4">
                            <button type="submit" class="cta-button">Lưu thông tin <i data-feather="save" class="w-4"></i></button>
                        </div>
                    </form>
                </div>

                <!-- Security Form -->
                <div class="bento-card border-l-4 border-l-slate-800">
                    <div class="flex items-center gap-3 mb-8">
                        <div class="w-10 h-10 bg-slate-50 text-slate-800 rounded-xl flex items-center justify-center"><i data-feather="shield"></i></div>
                        <h2 class="text-xl font-black text-slate-800">Thay đổi mật khẩu</h2>
                    </div>

                    <form id="password-form" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-1">
                                <label class="form-label">Mật khẩu mới</label>
                                <input id="new-password" type="password" class="form-input" placeholder="••••••••" required>
                            </div>
                            <div class="space-y-1">
                                <label class="form-label">Xác nhận mật khẩu</label>
                                <input id="confirm-password" type="password" class="form-input" placeholder="••••••••" required>
                            </div>
                        </div>
                        <div class="flex justify-end pt-4">
                            <button type="submit" class="cta-button btn-dark">Đổi mật khẩu <i data-feather="lock" class="w-4"></i></button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Logic JS (GIỮ NGUYÊN TẤT CẢ LOGIC CỦA BẠN) -->
    <script type="module" src="../firebase-config.js"></script>
    <script type="module" src="/src/js/teacher/account.js"></script>


</body>
</html>
