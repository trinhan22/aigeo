<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://i.ibb.co/JWTx6WrX/FAVICON.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGEO - Giám sát Thi</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0D9488;
            --secondary: #10B981;
            --text-main: #1E293B;
            --text-light: #64748B;
            --bg-body: #F8FAFC;
            --primary-gradient: linear-gradient(135deg, #0D9488 0%, #10B981 100%);
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-body); color: var(--text-main); overflow: hidden; }

        /* --- SIDEBAR STYLE (Đồng bộ) --- */
        .sidebar { width: 280px; background: white; border-right: 1px solid #E2E8F0; height: 100vh; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-group-title { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #94A3B8; padding: 1.5rem 1.5rem 0.5rem; }
        .sidebar-link { display: flex; align-items: center; padding: 0.8rem 1.5rem; color: var(--text-light); font-weight: 600; font-size: 0.9rem; transition: 0.3s; gap: 12px; }
        .sidebar-link:hover { color: var(--primary); background: #F0FDFA; }
        .sidebar-link.active { background: var(--primary-gradient); color: white; border-radius: 12px; margin: 0 12px; box-shadow: 0 10px 15px -3px rgba(13, 148, 136, 0.2); }

        /* --- MONITORING CARD STYLE --- */
        .student-monitor-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            border: 2px solid transparent;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
        }

        .card-online { border-color: #5EEAD4 !important; box-shadow: 0 10px 25px -5px rgba(13, 148, 136, 0.1); }
        .card-locked { border-color: #F87171 !important; background-color: #FEF2F2 !important; }
        .card-waiting { border-color: #FBBF24 !important; background-color: #FFFBEB !important; }
        .card-finished { border-color: #E2E8F0 !important; background-color: #F8FAFC !important; opacity: 0.7; }

        .badge-status { padding: 4px 12px; border-radius: 100px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; display: inline-block; }
        
        .avatar-box { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.9rem; }
        .btn-action { padding: 10px 16px; border-radius: 12px; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; transition: 0.3s; border: none; cursor: pointer; }

        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #0D9488; }


    </style>

    <link rel="stylesheet" href="../global-responsive.css?v=5">
</head>
<body class="flex h-screen">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="p-8">
            <a href="/" class="flex items-center gap-3">
                <img src="https://i.ibb.co/JWTx6WrX/FAVICON.png" class="h-9 w-auto">
                <span class="text-xl font-black text-teal-600 tracking-tight">AIGEO</span>
            </a>
        </div>
        <nav class="flex-grow overflow-y-auto">
            <a href="index.html" class="sidebar-link"><i data-feather="grid"></i> Tổng quan</a>
            <div class="nav-group-title">Quản lý</div>
            <a href="classrooms.html" class="sidebar-link active"><i data-feather="users"></i> Quản lý Lớp học</a>
            <a href="tests.html" class="sidebar-link"><i data-feather="file-text"></i> Quản lý đề thi</a>
            <a href="question-bank.html" class="sidebar-link"><i data-feather="database"></i> Ngân hàng câu hỏi</a>
            <div class="nav-group-title">Cá nhân</div>
            <a href="account.html" class="sidebar-link"><i data-feather="user"></i> Tài khoản</a>
        </nav>
        <div class="p-4 border-t">
            <button id="logout-btn" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition">
                <i data-feather="log-out"></i> Đăng xuất
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- Header -->
        <header class="h-16 bg-white border-b flex items-center justify-between px-8 shrink-0 z-10">
            <div class="flex items-center gap-4">
                 <h1 class="text-lg font-black text-slate-800 leading-none truncate max-w-md">Giám sát: <span id="test-name" class="text-teal-600 tracking-tight">Đang tải...</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p id="user-name" class="text-sm font-black text-slate-800 leading-none">Đang tải...</p>
                    <span class="text-[10px] font-bold text-teal-600 uppercase">Teacher Account</span>
                </div>
                <img id="user-avatar" class="h-10 w-10 rounded-xl border-2 border-slate-100 object-cover shadow-sm">
            </div>
        </header>

        <!-- Monitoring Board Area -->
        <div class="flex-1 overflow-y-auto bg-slate-50/50 p-4 md:p-8">
            <div class="max-w-7xl mx-auto space-y-8">
                
                <!-- Breadcrumb & Legend -->
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                    <a href="classrooms.html" id="back-to-class" class="flex items-center gap-2 text-xs font-black text-slate-400 uppercase tracking-widest hover:text-teal-600 transition">
                        <i data-feather="arrow-left" class="w-4"></i> Trở lại
                    </a>
                    <div class="flex flex-wrap items-center gap-4 bg-white p-2 px-4 rounded-2xl border border-slate-100 shadow-sm">
                         <div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-green-500"></span><span class="text-[10px] font-bold text-slate-500 uppercase">Đang làm</span></div>
                         <div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-amber-500"></span><span class="text-[10px] font-bold text-slate-500 uppercase">Phòng chờ</span></div>
                         <div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-red-500"></span><span class="text-[10px] font-bold text-slate-500 uppercase">Bị khóa</span></div>
                    </div>
                </div>

                <!-- Loading container -->
                <div id="loading-container" class="flex flex-col items-center justify-center py-20 gap-4">
                    <div class="w-10 h-10 border-4 border-teal-500 border-t-transparent rounded-full animate-spin"></div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Đang kết nối phòng thi...</p>
                </div>
                
                <!-- Main Grid (REALTIME UPDATES HERE) -->
                <div id="monitoring-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6 pb-20">
                    <!-- Student Cards dynamically injected -->
                </div>
            </div>
        </div>
    </main>

    <script src="../firebase-config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        document.addEventListener('DOMContentLoaded', () => {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            let currentUser = null, sessionListener = null;
            const monitoringGrid = document.getElementById('monitoring-grid');
            const loadingContainer = document.getElementById('loading-container');

            // --- 1. AUTH LOGIC ---
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUser = user;
                    const docSnap = await getDoc(doc(db, "users", user.uid));
                    if (docSnap.exists()) {
                        const userData = docSnap.data();
                        document.getElementById('user-name').textContent = userData.name;
                        document.getElementById('user-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(userData.name)}&background=0D9488&color=fff&bold=true`;
                        initMonitoring();
                    }
                } else { window.location.href = '../auth.html'; }
            });

            // --- 2. RENDERING LOGIC (The Core for Realtime) ---
            function getCardContent(session) {
                const colors = getStatusColors(session.status);
                const isLocked = session.status === 'locked';
                const progress = session.progress || 0;
                const total = session.totalQuestions || '--';

                return `
                    <div class="flex items-center gap-4 mb-6">
                        <div class="avatar-box bg-slate-100 text-slate-500 shadow-sm">${(session.studentName || 'S').charAt(0).toUpperCase()}</div>
                        <div class="overflow-hidden">
                            <h3 class="font-black text-slate-800 text-sm truncate">${session.studentName}</h3>
                            <span class="badge-status ${colors.badgeCls}">${statusText(session.status)}</span>
                        </div>
                    </div>

                    ${isLocked ? `
                        <div class="mb-6 p-3 bg-red-100/50 rounded-xl border border-red-100">
                            <p class="text-[10px] font-black text-red-600 uppercase mb-1 leading-none italic">Lý do vi phạm:</p>
                            <p class="text-xs font-bold text-red-800 leading-tight">${session.violationReason || 'Thoát màn hình'}</p>
                        </div>
                    ` : ''}

                    <div class="flex justify-between items-end mb-4">
                        <div>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Tiến độ</p>
                            <p class="font-black text-slate-700 text-sm">${progress}/${total} <span class="text-[10px] font-bold text-slate-300">câu</span></p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Cảnh báo</p>
                            <p class="font-black ${session.warnings > 0 ? 'text-red-500' : 'text-slate-700'} text-sm">${session.warnings || 0}</p>
                        </div>
                    </div>

                    <div class="mt-auto pt-6 border-t border-slate-50 flex gap-2">
                        ${isLocked ? `
                            <button data-session-id="${session.id}" data-action="resume" class="btn-action flex-1 bg-teal-600 text-white shadow-lg shadow-teal-100 hover:scale-105 transition">Duyệt</button>
                            <button data-session-id="${session.id}" data-action="submit" class="btn-action flex-1 bg-slate-800 text-white hover:bg-black transition">Nộp bài</button>
                        ` : `
                            <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                <div class="h-full bg-teal-500 transition-all duration-700" style="width: ${(progress/total)*100 || 0}%"></div>
                            </div>
                        `}
                    </div>
                `;
            }

            // --- 3. REALTIME LISTENER ---
            async function initMonitoring() {
                const urlParams = new URLSearchParams(window.location.search);
                const testId = urlParams.get('testId');
                const classId = urlParams.get('classId');
                if (!testId || !classId) return;

                const testDoc = await getDoc(doc(db, "tests", testId));
                if(testDoc.exists()) document.getElementById('test-name').textContent = testDoc.data().name;

                const q = query(collection(db, "test_sessions"), 
                                where("teacherId", "==", currentUser.uid),
                                where("testId", "==", testId), 
                                where("classId", "==", classId));
                
                onSnapshot(q, (snapshot) => {
                    loadingContainer.classList.add('hidden');
                    
                    snapshot.docChanges().forEach(change => {
                        const session = { id: change.doc.id, ...change.doc.data() };
                        const existingCard = document.getElementById(`session-${session.id}`);
                        
                        if (change.type === "added" || change.type === "modified") {
                            const colors = getStatusColors(session.status);
                            if (existingCard) {
                                // Realtime update existing card
                                existingCard.className = `student-monitor-card ${colors.cardCls}`;
                                existingCard.innerHTML = getCardContent(session);
                            } else {
                                // Add new card
                                const card = document.createElement('div');
                                card.id = `session-${session.id}`;
                                card.className = `student-monitor-card ${colors.cardCls}`;
                                card.innerHTML = getCardContent(session);
                                monitoringGrid.appendChild(card);
                            }
                        } else if (change.type === "removed") {
                            if (existingCard) existingCard.remove();
                        }
                    });

                    if (monitoringGrid.children.length === 0) {
                        monitoringGrid.innerHTML = '<p class="text-slate-400 font-bold col-span-full text-center py-10">Chưa có học sinh tham gia.</p>';
                    }
                    feather.replace();
                });
            }

            // --- 4. ACTION CONTROLS (Realtime interaction) ---
            monitoringGrid.onclick = async (e) => {
                const btn = e.target.closest('button');
                if (!btn) return;
                const { sessionId, action } = btn.dataset;
                const ref = doc(db, "test_sessions", sessionId);
                
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

                try {
                    if (action === 'resume') await updateDoc(ref, { status: 'online' });
                    else if (action === 'submit') await updateDoc(ref, { status: 'force_submit' });
                } catch (err) {
                    console.error(err);
                    alert("Lỗi thao tác!");
                }
            };

            // --- UTILS ---
            function getStatusColors(status) {
                switch (status) {
                    case 'online': return { cardCls: 'card-online', badgeCls: 'bg-green-100 text-green-600' };
                    case 'locked': return { cardCls: 'card-locked', badgeCls: 'bg-red-500 text-white shadow-lg shadow-red-200' };
                    case 'waiting': return { cardCls: 'card-waiting', badgeCls: 'bg-amber-100 text-amber-600' };
                    case 'finished': return { cardCls: 'card-finished', badgeCls: 'bg-slate-200 text-slate-500' };
                    default: return { cardCls: '', badgeCls: 'bg-slate-100 text-slate-400' };
                }
            }

            function statusText(status) {
                switch (status) {
                    case 'online': return 'Đang làm bài';
                    case 'locked': return 'Bị khóa';
                    case 'waiting': return 'Phòng chờ';
                    case 'finished': return 'Đã nộp bài';
                    default: return status;
                }
            }

            document.getElementById('logout-btn').onclick = () => signOut(auth);
            feather.replace();
        });
    </script>

<script type="text/javascript">
    // 1. Chặn Chuột phải (Để ẩn menu "Inspect/Kiểm tra" và "View Source/Xem nguồn")
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        // Không hiện thông báo gì cả để trải nghiệm mượt mà hơn
    });

    // 2. Chặn các phím tắt Developer Tools
    document.addEventListener('keydown', function(e) {
        // Chặn F12
        if (e.key === 'F12' || e.keyCode === 123) {
            e.preventDefault();
            return false;
        }

        // Chặn các tổ hợp phím Ctrl + ...
        if (e.ctrlKey) {
            switch (e.key.toLowerCase()) {
                case 'u': // Chặn Ctrl + U (Xem source code)
                case 's': // Chặn Ctrl + S (Lưu trang web)
                case 'p': // Chặn Ctrl + P (In trang web - thường hiện code)
                // Lưu ý: KHÔNG chặn 'c' (Copy) và 'a' (Select All)
                    e.preventDefault();
                    return false;
            }

            // Chặn Ctrl + Shift + ... (Các phím mở DevTools)
            if (e.shiftKey) {
                switch (e.key.toLowerCase()) {
                    case 'i': // Inspect Element
                    case 'j': // Console
                    case 'c': // Element Inspector
                        e.preventDefault();
                        return false;
                }
            }
        }
    });
</script>
</body>
</html>
