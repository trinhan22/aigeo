<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://i.ibb.co/JWTx6WrX/FAVICON.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGEO - Tiến độ Học sinh</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/main.css">
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Rendering Engines -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <link rel="stylesheet" href="/src/css/teacher/student.css">
</head>
<body class="flex h-screen">

    <!-- Sidebar (Đồng bộ) -->
    <aside class="sidebar">
        <div class="p-8">
            <a href="/" class="flex items-center gap-3">
                <img src="https://i.ibb.co/JWTx6WrX/FAVICON.png" class="h-9 w-auto">
                <span class="text-xl font-black text-teal-600 tracking-tight">AIGEO</span>
            </a>
        </div>
        <nav class="flex-grow overflow-y-auto">
            <a href="index.html" class="sidebar-link"><i data-feather="grid"></i> Tổng quan</a>
            <div class="nav-group-title">Quản lý học tập</div>
            <a href="classrooms.html" class="sidebar-link active"><i data-feather="users"></i> Quản lý Lớp học</a>
            <a href="tests.html" class="sidebar-link"><i data-feather="file-text"></i> Quản lý đề thi</a>
            <a href="question-bank.html" class="sidebar-link"><i data-feather="database"></i> Ngân hàng câu hỏi</a>
            <div class="nav-group-title">Cá nhân</div>
            <a href="account.html" class="sidebar-link"><i data-feather="user"></i> Tài khoản</a>
        </nav>
        <div class="p-4 border-t">
            <button id="logout-btn" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition">
                <i data-feather="log-out"></i> Đăng xuất
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- Header -->
        <header class="h-16 bg-white border-b flex items-center justify-between px-8 shrink-0">
            <div class="flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-widest leading-none">
                <a href="index.html" class="hover:text-teal-600">Tổng Quan</a>
                <span>/</span>
                <a href="classrooms.html" class="hover:text-teal-600">Quản Lý Lớp Học</a>
                <span>/</span>
                <span class="text-slate-800">Danh Sách Học Sinh</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p id="user-name" class="text-sm font-black text-slate-800 leading-none">Đang tải...</p>
                    <span class="text-[10px] font-bold text-teal-600 uppercase">Teacher Account</span>
                </div>
                <img id="user-avatar" class="h-10 w-10 rounded-xl border-2 border-slate-100 object-cover shadow-sm">
            </div>
        </header>

        <!-- Main Content -->
        <div class="flex-1 overflow-x-hidden overflow-y-auto bg-slate-50/50 p-8">
            <div class="max-w-7xl mx-auto">
                <!-- Profile Banner -->
                <div id="page-header" class="flex items-center gap-6 mb-10">
                    <a href="javascript:history.back()" class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center border border-slate-200 hover:bg-slate-50 transition shadow-sm">
                        <i data-feather="chevron-left" class="text-slate-600"></i>
                    </a>
                    <div>
                        <h1 id="student-name-header" class="text-3xl font-black text-slate-900 tracking-tight">Đang tải...</h1>
                        <p class="text-teal-600 font-bold mt-1 uppercase text-[10px] tracking-widest italic">Phân tích học lực chi tiết</p>
                    </div>
                </div>
                
                <!-- Stats and Content Injected by JS -->
                <div id="stats-container" class="space-y-10">
                    <div class="skeleton h-64 w-full rounded-[32px]"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Result Modal (Đồng bộ style SaaS) -->
    <div id="result-modal" class="fixed inset-0 z-50 items-center justify-center hidden modal-backdrop p-4">
        <div class="modal-content w-full max-w-4xl max-h-[90vh] flex flex-col">
            <div class="p-6 border-b flex justify-between items-center shrink-0">
                <h2 id="result-modal-title" class="text-xl font-black text-slate-800">Chi tiết bài làm</h2>
                <button id="result-modal-close-btn" class="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-full hover:bg-slate-100 transition"><i data-feather="x" class="w-4"></i></button>
            </div>
            <div id="result-modal-content" class="flex-grow overflow-y-auto p-8 space-y-8">
                <!-- Questions injected here -->
            </div>
        </div>
    </div>
    
    <script type="module" src="../firebase-config.js"></script>
    <script type="module" src="/src/js/teacher/student.js"></script>


</body>
</html>
