<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://i.ibb.co/JWTx6WrX/FAVICON.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGEO - Tiến độ Lớp học</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        :root {
            --primary: #0D9488;
            --primary-light: #F0FDFA;
            --secondary: #10B981;
            --text-main: #1E293B;
            --text-light: #64748B;
            --bg-body: #F8FAFC;
            --primary-gradient: linear-gradient(135deg, #0D9488 0%, #10B981 100%);
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-body); color: var(--text-main); overflow: hidden; }

        /* --- SIDEBAR STYLE (Đồng bộ) --- */
        .sidebar { width: 280px; background: white; border-right: 1px solid #E2E8F0; height: 100vh; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-group-title { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #94A3B8; padding: 1.5rem 1.5rem 0.5rem; }
        .sidebar-link { display: flex; align-items: center; padding: 0.8rem 1.5rem; color: var(--text-light); font-weight: 600; font-size: 0.9rem; transition: 0.3s; gap: 12px; }
        .sidebar-link i { width: 18px; height: 18px; }
        .sidebar-link:hover { color: var(--primary); background: var(--primary-light); }
        .sidebar-link.active { background: var(--primary-gradient); color: white; border-radius: 12px; margin: 0 12px; box-shadow: 0 10px 15px -3px rgba(13, 148, 136, 0.2); }

        /* --- STUDENT CARD STYLE --- */
        .student-card {
            background: white;
            border-radius: 24px;
            border: 1px solid #E2E8F0;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }
        .student-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 12px 24px -10px rgba(13, 148, 136, 0.2);
        }
        .student-card::after {
            content: 'CHI TIẾT →';
            position: absolute;
            bottom: 0; right: 0;
            font-size: 8px; font-weight: 900;
            background: var(--primary-gradient);
            color: white;
            padding: 4px 10px;
            border-radius: 12px 0 0 0;
            opacity: 0;
            transition: 0.3s;
        }
        .student-card:hover::after { opacity: 1; }

        .avatar-initial {
            width: 48px; height: 48px;
            border-radius: 16px;
            background: #F1F5F9;
            color: #64748B;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.1rem;
            transition: 0.3s;
        }
        .student-card:hover .avatar-initial {
            background: var(--primary-light);
            color: var(--primary);
            transform: scale(1.1);
        }

        /* --- STUDENT CARD STYLE (Unified) --- */
        .student-card {
            background: white;
            border-radius: 24px;
            border: 1px solid #E2E8F0;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative; /* Để nút con bám theo */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            height: 100%;
        }

        /* Hiệu ứng hover cho cả cái card */
        .student-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 15px 30px -10px rgba(13, 148, 136, 0.1);
        }

        /* Nút xoá nằm TRONG card */
        .kick-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 28px;
            height: 28px;
            background: #F1F5F9; /* Màu xám nhạt trung tính khi bình thường */
            color: #94A3B8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            z-index: 10;
            opacity: 0; /* Ẩn đi */
            transform: scale(0.8);
        }

        /* Khi hover vào card thì nút xoá hiện lên bên trong */
        .student-card:hover .kick-btn {
            opacity: 1;
            transform: scale(1);
        }

        /* Khi di chuột trực tiếp vào nút xoá */
        .kick-btn:hover {
            background: #FEE2E2 !important;
            color: #EF4444 !important;
            transform: scale(1.1) !important;
        }

        /* Phần link bao phủ diện tích card trừ nút xoá */
        .card-link {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-grow: 1;
            text-decoration: none;
            color: inherit;
        }

        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #0D9488; }
        .toast { transition: 0.3s; transform: translateY(100%); opacity: 0; }
        .toast.show { transform: translateY(0); opacity: 1; }

/* ============================================================
   AIGEO CLASSROOMS MOBILE OPTIMIZATION - PROFESSIONAL UI

    }

    .sidebar nav {
        display: flex !important;
        flex-direction: row !important;
        width: 100% !important;
        justify-content: space-around !important;
        align-items: center !important;
        padding: 0 5px !important;
    }

    .sidebar-link {
        flex: 1 !important;
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        justify-content: center !important;
        padding: 0 !important;
        margin: 0 !important;
        height: 100% !important;
        font-size: 0 !important; /* Ẩn chữ */
        color: #94A3B8 !important;
        position: relative !important;
    }

    .sidebar-link i, .sidebar-link svg {
        width: 22px !important;
        height: 22px !important;
        margin: 0 !important;
    }

    /* Chỉ dấu Active tinh tế */
    .sidebar-link.active {
        background: transparent !important;
        color: var(--primary) !important;
        box-shadow: none !important;
    }

    .sidebar-link.active::after {
        content: '';
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 20px;
        height: 4px;
        background: var(--primary);
        border-radius: 0 0 4px 4px;
    }

    /* 4. MAIN CONTENT AREA */
    main {
        display: block !important;
        padding-bottom: 80px !important; /* Tránh menu che khuất */
    }

    .bg-slate-50\/50 {
        padding: 20px 16px !important; /* Giảm padding tổng quát */
    }

    /* 5. TITLE & JOIN BUTTON */
    .flex-col.md\:flex-row {
        gap: 16px !important;
        margin-bottom: 30px !important;
    }

    h1.text-4xl {
        font-size: 1.8rem !important; /* Thu nhỏ tiêu đề chính */
        text-align: left;
    }

    .cta-button {
        width: 100% !important; /* Nút "Tham gia lớp mới" rộng 100% */
        justify-content: center !important;
        padding: 14px !important;
        font-size: 14px !important;
    }

    /* 6. CLASS CARDS GRID */
    #classrooms-grid {
        grid-template-columns: 1fr !important; /* Một lớp một dòng */
        gap: 20px !important;
    }

    .class-card {
        padding: 24px !important; /* Thu hẹp padding card */
        border-radius: 28px !important;
    }

    .class-card h3 {
        font-size: 1.25rem !important;
    }

    /* 7. TOASTS & MODALS */
    #toast-container {
        bottom: 85px !important; /* Đẩy lên trên Bottom Nav */
        left: 16px !important;
        right: 16px !important;
    }

    .modal-backdrop > div {
        width: 92% !important;
        padding: 24px !important;
        border-radius: 30px !important;
    }

    /* Phản hồi chạm (Touch Feedback) */
    .class-card:active {
        transform: scale(0.98);
        transition: 0.1s;
    }
}
    </style>

    <script src="../firebase-config.js"></script>
<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, updateDoc, arrayRemove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        document.addEventListener('DOMContentLoaded', () => {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            let currentUser = null;
            let currentClassId = null;
            const progressArea = document.getElementById('progress-area');
            const classNameHeader = document.getElementById('class-name-header');
            const classSubjectHeader = document.getElementById('class-subject-header');

            // --- 1. AUTH LOGIC ---
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUser = user;
                    const docSnap = await getDoc(doc(db, "users", user.uid));
                    if (docSnap.exists() && docSnap.data().role === 'teacher') {
                        const userData = docSnap.data();
                        document.getElementById('user-name').textContent = userData.name;
                        document.getElementById('user-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(userData.name)}&background=0D9488&color=fff&bold=true`;
                        initPage();
                    } else { window.location.href = '../auth.html'; }
                } else { window.location.href = '../auth.html'; }
            });

            // --- 2. HÀM ĐUỔI HỌC SINH ---
            function setupKickLogic() {
                document.querySelectorAll('.kick-btn').forEach(btn => {
                    btn.onclick = async (e) => {
                        e.preventDefault();
                        e.stopPropagation(); // Chặn click nhảy vào trang student.html

                        const studentId = btn.getAttribute('data-id');
                        const studentName = btn.getAttribute('data-name');

                        if (confirm(`Bạn có chắc chắn muốn mời học sinh "${studentName}" ra khỏi lớp không?`)) {
                            try {
                                btn.disabled = true;
                                btn.innerHTML = `<i class="animate-spin" data-feather="loader"></i>`;
                                feather.replace();

                                const classDocRef = doc(db, "classrooms", currentClassId);
                                await updateDoc(classDocRef, {
                                    students: arrayRemove(studentId)
                                });

                                alert("Đã xóa học sinh thành công!");
                                initPage(); // Tải lại danh sách học sinh

                            } catch (error) {
                                console.error("Lỗi xóa:", error);
                                alert("Đã có lỗi xảy ra.");
                                btn.disabled = false;
                                btn.innerHTML = `<i data-feather="user-x"></i>`;
                                feather.replace();
                            }
                        }
                    };
                });
            }

            function renderStudentList(students) {
                if (students.length === 0) {
                    progressArea.innerHTML = `<div class="col-span-full py-20 text-center"><p class="text-slate-400 font-bold uppercase tracking-widest text-xs">Lớp học chưa có học sinh</p></div>`;
                    return;
                }
                
                progressArea.innerHTML = '';
                progressArea.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-20';

                students.sort((a, b) => (a.name || '').localeCompare(b.name || '')).forEach((student) => {
                    const initial = (student.name || 'S').charAt(0).toUpperCase();
                    
                    const card = document.createElement('div');
                    card.className = "student-card"; // Khối trắng bao quanh tất cả

                    card.innerHTML = `
                        <!-- Nút xoá: Nằm trong Card nhưng tách biệt với Link -->
                        <button class="kick-btn" data-id="${student.id}" data-name="${student.name}" title="Xoá học sinh">
                            <i data-feather="x" class="w-3 h-3"></i>
                        </button>

                        <!-- Link chi tiết: Bao phủ avatar và text -->
                        <a href="student.html?studentId=${student.id}&studentName=${encodeURIComponent(student.name)}&classId=${currentClassId}" class="card-link nav-link">
                            <div class="avatar-initial shadow-sm">${initial}</div>
                            <div class="overflow-hidden">
                                <p class="font-black text-slate-800 truncate text-sm">${student.name}</p>
                                <p class="text-[10px] font-bold text-slate-400 truncate uppercase tracking-tighter">${student.email || 'N/A'}</p>
                            </div>
                        </a>
                    `;
                    progressArea.appendChild(card);
                });

                feather.replace();
                setupKickLogic(); 
                attachNavLinkLogic(); 
            }

            // --- 4. TẢI DỮ LIỆU ---
            async function initPage() {
                const urlParams = new URLSearchParams(window.location.search);
                currentClassId = urlParams.get('classId');
                if (!currentClassId) return;

                try {
                    const classDocRef = doc(db, "classrooms", currentClassId);
                    const classDocSnap = await getDoc(classDocRef);
                    
                    if (classDocSnap.exists()) {
                        const classroomData = classDocSnap.data();
                        
                        // Lấy tên môn học
                        const subjectDocSnap = await getDoc(doc(db, "subjects", classroomData.subjectId));
                        const subjectName = subjectDocSnap.exists() ? subjectDocSnap.data().name : "Địa lý";
                        
                        classNameHeader.textContent = `Danh sách học sinh lớp: ${classroomData.className}`;
                        classSubjectHeader.textContent = `${subjectName} - Lớp ${classroomData.grade}`;
                        
                        const studentIds = classroomData.students || [];
                        if (studentIds.length === 0) {
                             progressArea.innerHTML = `<div class="col-span-full py-20 text-center"><p class="text-slate-400 font-bold uppercase text-xs">Lớp chưa có học sinh</p></div>`;
                             return;
                        }
                        
                        const studentDocs = await fetchDocsInChunks(collection(db, "users"), "__name__", studentIds);
                        renderStudentList(studentDocs);
                    }
                } catch (error) { console.error(error); }
            }
            
            async function fetchDocsInChunks(collectionRef, field, ids) {
                if (!ids || ids.length === 0) return [];
                const allDocsData = [];
                for (let i = 0; i < ids.length; i += 30) {
                    const chunk = ids.slice(i, i + 30);
                    const q = query(collectionRef, where(field, "in", chunk));
                    const snapshot = await getDocs(q);
                    snapshot.forEach(doc => allDocsData.push({id: doc.id, ...doc.data()}));
                }
                return allDocsData;
            }

            function attachNavLinkLogic() {
                document.querySelectorAll('.nav-link').forEach(link => {
                    link.onclick = (e) => {
                        e.preventDefault();
                        document.body.style.opacity = '0';
                        setTimeout(() => { window.location.href = link.href; }, 200);
                    }
                });
            }

            document.getElementById('logout-btn').onclick = () => signOut(auth);
            feather.replace();
        });
    </script>

<script type="text/javascript">
    // 1. Chặn Chuột phải (Để ẩn menu "Inspect/Kiểm tra" và "View Source/Xem nguồn")
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        // Không hiện thông báo gì cả để trải nghiệm mượt mà hơn
    });

    // 2. Chặn các phím tắt Developer Tools
    document.addEventListener('keydown', function(e) {
        // Chặn F12
        if (e.key === 'F12' || e.keyCode === 123) {
            e.preventDefault();
            return false;
        }

        // Chặn các tổ hợp phím Ctrl + ...
        if (e.ctrlKey) {
            switch (e.key.toLowerCase()) {
                case 'u': // Chặn Ctrl + U (Xem source code)
                case 's': // Chặn Ctrl + S (Lưu trang web)
                case 'p': // Chặn Ctrl + P (In trang web - thường hiện code)
                // Lưu ý: KHÔNG chặn 'c' (Copy) và 'a' (Select All)
                    e.preventDefault();
                    return false;
            }

            // Chặn Ctrl + Shift + ... (Các phím mở DevTools)
            if (e.shiftKey) {
                switch (e.key.toLowerCase()) {
                    case 'i': // Inspect Element
                    case 'j': // Console
                    case 'c': // Element Inspector
                        e.preventDefault();
                        return false;
                }
            }
        }
    });
</script>
