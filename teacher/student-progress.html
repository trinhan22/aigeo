<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://i.ibb.co/JWTx6WrX/FAVICON.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGEO - Tiến độ Lớp học</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        :root {
            --primary: #0D9488;
            --primary-light: #F0FDFA;
            --secondary: #10B981;
            --text-main: #1E293B;
            --text-light: #64748B;
            --bg-body: #F8FAFC;
            --primary-gradient: linear-gradient(135deg, #0D9488 0%, #10B981 100%);
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-body); color: var(--text-main); overflow: hidden; }

        /* --- SIDEBAR STYLE (Đồng bộ) --- */
        .sidebar { width: 280px; background: white; border-right: 1px solid #E2E8F0; height: 100vh; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-group-title { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #94A3B8; padding: 1.5rem 1.5rem 0.5rem; }
        .sidebar-link { display: flex; align-items: center; padding: 0.8rem 1.5rem; color: var(--text-light); font-weight: 600; font-size: 0.9rem; transition: 0.3s; gap: 12px; }
        .sidebar-link i { width: 18px; height: 18px; }
        .sidebar-link:hover { color: var(--primary); background: var(--primary-light); }
        .sidebar-link.active { background: var(--primary-gradient); color: white; border-radius: 12px; margin: 0 12px; box-shadow: 0 10px 15px -3px rgba(13, 148, 136, 0.2); }

        /* --- STUDENT CARD STYLE --- */
        .student-card {
            background: white;
            border-radius: 24px;
            border: 1px solid #E2E8F0;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }
        .student-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 12px 24px -10px rgba(13, 148, 136, 0.2);
        }
        .student-card::after {
            content: 'CHI TIẾT →';
            position: absolute;
            bottom: 0; right: 0;
            font-size: 8px; font-weight: 900;
            background: var(--primary-gradient);
            color: white;
            padding: 4px 10px;
            border-radius: 12px 0 0 0;
            opacity: 0;
            transition: 0.3s;
        }
        .student-card:hover::after { opacity: 1; }

        .avatar-initial {
            width: 48px; height: 48px;
            border-radius: 16px;
            background: #F1F5F9;
            color: #64748B;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.1rem;
            transition: 0.3s;
        }
        .student-card:hover .avatar-initial {
            background: var(--primary-light);
            color: var(--primary);
            transform: scale(1.1);
        }

        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #0D9488; }
        .toast { transition: 0.3s; transform: translateY(100%); opacity: 0; }
        .toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body class="flex h-screen">

    <!-- Sidebar (Đồng bộ) -->
    <aside class="sidebar">
        <div class="p-8">
            <a href="/index.html" class="flex items-center gap-3">
                <img src="https://i.ibb.co/JWTx6WrX/FAVICON.png" class="h-9 w-auto" alt="Logo">
                <span class="text-xl font-black text-teal-600 tracking-tight">AIGEO</span>
            </a>
        </div>
        <nav class="flex-grow overflow-y-auto">
            <a href="index.html" class="sidebar-link"><i data-feather="grid"></i> Tổng quan</a>
            <div class="nav-group-title">Quản lý</div>
            <a href="classrooms.html" class="sidebar-link active"><i data-feather="users"></i> Quản lý Lớp học</a>
            <a href="tests.html" class="sidebar-link"><i data-feather="file-text"></i> Quản lý đề thi</a>
            <a href="question-bank.html" class="sidebar-link"><i data-feather="database"></i> Ngân hàng câu hỏi</a>
            <div class="nav-group-title">Cá nhân</div>
            <a href="account.html" class="sidebar-link"><i data-feather="user"></i> Tài khoản</a>
        </nav>
        <div class="p-4 border-t">
            <button id="logout-btn" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition">
                <i data-feather="log-out"></i> Đăng xuất
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- Header -->
        <header class="h-16 bg-white border-b flex items-center justify-between px-8 shrink-0">
            <div class="flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-widest leading-none">
                <a href="index.html" class="hover:text-teal-600">Dashboard</a>
                <span>/</span>
                <a href="classrooms.html" class="hover:text-teal-600">Classrooms</a>
                <span>/</span>
                <span class="text-slate-800">Student progress</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p id="user-name" class="text-sm font-black text-slate-800 leading-none">Đang tải...</p>
                    <span class="text-[10px] font-bold text-teal-600 uppercase tracking-tighter">Teacher Account</span>
                </div>
                <img id="user-avatar" class="h-10 w-10 rounded-xl border-2 border-slate-100 object-cover shadow-sm">
            </div>
        </header>

        <!-- Main Area -->
        <div class="flex-1 overflow-x-hidden overflow-y-auto bg-slate-50/50 p-8">
            <div class="max-w-7xl mx-auto">
                <!-- Class Banner -->
                <div class="flex items-center gap-6 mb-10">
                    <a href="classrooms.html" class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center border border-slate-200 hover:bg-slate-50 transition shadow-sm nav-link">
                        <i data-feather="chevron-left" class="text-slate-600"></i>
                    </a>
                    <div>
                        <h1 id="class-name-header" class="text-3xl font-black text-slate-900 tracking-tight">Đang tải thông tin lớp...</h1>
                        <p id="class-subject-header" class="text-teal-600 font-bold mt-1 uppercase text-[10px] tracking-widest"></p>
                    </div>
                </div>

                <!-- Student Grid -->
                <div id="progress-area">
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <!-- Skeleton Loader -->
                        <div class="h-24 bg-white rounded-[24px] animate-pulse border border-slate-100"></div>
                        <div class="h-24 bg-white rounded-[24px] animate-pulse border border-slate-100"></div>
                        <div class="h-24 bg-white rounded-[24px] animate-pulse border border-slate-100"></div>
                        <div class="h-24 bg-white rounded-[24px] animate-pulse border border-slate-100"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast-container" class="fixed bottom-10 right-10 z-50 flex flex-col gap-3"></div>

    <script src="../firebase-config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        document.addEventListener('DOMContentLoaded', () => {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            let currentUser = null;
            let currentClassId = null;
            const progressArea = document.getElementById('progress-area');
            const classNameHeader = document.getElementById('class-name-header');
            const classSubjectHeader = document.getElementById('class-subject-header');

            // --- AUTH LOGIC (GIỮ NGUYÊN) ---
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUser = user;
                    const docSnap = await getDoc(doc(db, "users", user.uid));
                    if (docSnap.exists() && docSnap.data().role === 'teacher') {
                        const userData = docSnap.data();
                        document.getElementById('user-name').textContent = userData.name;
                        document.getElementById('user-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(userData.name)}&background=0D9488&color=fff&bold=true`;
                        initPage();
                    } else { window.location.href = '../auth.html'; }
                } else { window.location.href = '../auth.html'; }
            });

            // --- OVERRIDE RENDER STUDENT LIST (Giao diện Profile Card Pro) ---
            window.renderStudentList = (students) => {
                if (students.length === 0) {
                    progressArea.innerHTML = `<div class="col-span-full py-20 text-center"><p class="text-slate-400 font-bold uppercase tracking-widest text-xs">Lớp học chưa có học sinh</p></div>`;
                    return;
                }
                
                progressArea.innerHTML = '';
                progressArea.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-20';

                students.sort((a, b) => (a.name || '').localeCompare(b.name || '')).forEach((student) => {
                    const initial = (student.name || 'S').charAt(0).toUpperCase();
                    const card = document.createElement('a');
                    card.href = `student.html?studentId=${student.id}&studentName=${encodeURIComponent(student.name)}&classId=${currentClassId}`;
                    card.className = "student-card nav-link";
                    
                    card.innerHTML = `
                        <div class="avatar-initial shadow-sm">${initial}</div>
                        <div class="overflow-hidden">
                            <p class="font-black text-slate-800 truncate text-sm">${student.name}</p>
                            <p class="text-[10px] font-bold text-slate-400 truncate uppercase tracking-tighter">${student.email || 'N/A'}</p>
                        </div>
                    `;
                    progressArea.appendChild(card);
                });
                feather.replace();
                attachNavLinkLogic(); // Gán lại hiệu ứng chuyển trang
            }

            async function initPage() {
                const urlParams = new URLSearchParams(window.location.search);
                currentClassId = urlParams.get('classId');
                if (!currentClassId) {
                    progressArea.innerHTML = `<p class="p-8 text-center text-red-600">Thông tin không hợp lệ. Vui lòng quay lại.</p>`;
                    return;
                }
                progressArea.innerHTML = `<p class="p-8 text-center text-slate-500">Đang tải dữ liệu tiến độ...</p>`;
                try {
                    const classDocRef = doc(db, "classrooms", currentClassId);
                    const classDocSnap = await getDoc(classDocRef);
                    if (!classDocSnap.exists() || classDocSnap.data().teacherId !== currentUser.uid) {
                        throw new Error("Không tìm thấy lớp học hoặc bạn không có quyền truy cập.");
                    }
                    const classroomData = { id: classDocSnap.id, ...classDocSnap.data() };
                    
                    const subjectDocSnap = await getDoc(doc(db, "subjects", classroomData.subjectId));
                    const subjectName = subjectDocSnap.exists() ? subjectDocSnap.data().name : "Không rõ";
                    
                    classNameHeader.textContent = `Danh sách học sinh lớp: ${classroomData.className}`;
                    classSubjectHeader.textContent = `${subjectName} - Lớp ${classroomData.grade}`;
                    
                    const studentIds = classroomData.students || [];
                    if (studentIds.length === 0) {
                         progressArea.innerHTML = `<p class="p-8 text-center text-slate-500">Lớp học này chưa có học sinh nào.</p>`;
                         return;
                    }
                    
                    const studentDocs = await fetchDocsInChunks(collection(db, "users"), "__name__", studentIds);
                    renderStudentList(studentDocs);

                } catch (error) {
                    console.error("Error loading student progress:", error);
                    progressArea.innerHTML = `<p class="p-8 text-center text-red-600">${error.message}</p>`;
                }
            }
            
            async function fetchDocsInChunks(collectionRef, field, ids) {
                if (!ids || ids.length === 0) return [];
                const allDocsData = [];
                for (let i = 0; i < ids.length; i += 30) {
                    const chunk = ids.slice(i, i + 30);
                    if (chunk.length > 0) {
                        const q = query(collectionRef, where(field, "in", chunk));
                        const snapshot = await getDocs(q);
                        snapshot.forEach(doc => allDocsData.push({id: doc.id, ...doc.data()}));
                    }
                }
                return allDocsData;
            }

            function renderStudentList(students) {
                progressArea.innerHTML = '';
                progressArea.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6';

                students.sort((a, b) => (a.name || '').localeCompare(b.name || '')).forEach((student) => {
                    const nameInitial = (student.name || 'S').charAt(0).toUpperCase();
                    const studentCard = document.createElement('a');
                    // *** SỬA LỖI: Thêm classId vào href ***
                    studentCard.href = `student.html?studentId=${student.id}&studentName=${encodeURIComponent(student.name)}&classId=${currentClassId}`;
                    studentCard.className = "nav-link bg-white p-5 rounded-xl shadow-sm flex items-center space-x-4 transition-transform transform hover:-translate-y-1 hover:shadow-lg";
                    
                    studentCard.innerHTML = `
                        <div class="w-12 h-12 rounded-full bg-slate-200 flex items-center justify-center font-bold text-slate-600 flex-shrink-0">
                            ${nameInitial}
                        </div>
                        <div class="overflow-hidden">
                            <p class="font-bold text-slate-800 truncate">${student.name}</p>
                            <p class="text-sm text-slate-500 truncate">${student.email || 'N/A'}</p>
                        </div>
                    `;
                    progressArea.appendChild(studentCard);
                });
            }
            
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    document.body.style.opacity = '0';
                    setTimeout(() => { window.location.href = this.href; }, 200);
                });
            });
            document.body.style.transition = 'opacity 0.2s ease-in-out';
            
            function attachNavLinkLogic() {
                document.querySelectorAll('.nav-link').forEach(link => {
                    link.onclick = (e) => {
                        e.preventDefault();
                        document.body.style.opacity = '0';
                        setTimeout(() => { window.location.href = link.href; }, 200);
                    }
                });
            }

            document.getElementById('logout-btn').onclick = () => signOut(auth);
            document.body.style.transition = 'opacity 0.2s ease-in-out';
            feather.replace();
        });
    </script>

<script type="text/javascript">
    // 1. Chặn Chuột phải (Để ẩn menu "Inspect/Kiểm tra" và "View Source/Xem nguồn")
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        // Không hiện thông báo gì cả để trải nghiệm mượt mà hơn
    });

    // 2. Chặn các phím tắt Developer Tools
    document.addEventListener('keydown', function(e) {
        // Chặn F12
        if (e.key === 'F12' || e.keyCode === 123) {
            e.preventDefault();
            return false;
        }

        // Chặn các tổ hợp phím Ctrl + ...
        if (e.ctrlKey) {
            switch (e.key.toLowerCase()) {
                case 'u': // Chặn Ctrl + U (Xem source code)
                case 's': // Chặn Ctrl + S (Lưu trang web)
                case 'p': // Chặn Ctrl + P (In trang web - thường hiện code)
                // Lưu ý: KHÔNG chặn 'c' (Copy) và 'a' (Select All)
                    e.preventDefault();
                    return false;
            }

            // Chặn Ctrl + Shift + ... (Các phím mở DevTools)
            if (e.shiftKey) {
                switch (e.key.toLowerCase()) {
                    case 'i': // Inspect Element
                    case 'j': // Console
                    case 'c': // Element Inspector
                        e.preventDefault();
                        return false;
                }
            }
        }
    });
</script>
</body>
</html>
