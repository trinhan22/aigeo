<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://i.ibb.co/JWTx6WrX/FAVICON.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGEO - Quản lý Tài khoản</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        :root {
            --primary: #0D9488;
            --primary-light: #F0FDFA;
            --secondary: #10B981;
            --text-main: #1E293B;
            --text-light: #64748B;
            --bg-body: #F8FAFC;
            --primary-gradient: linear-gradient(135deg, #0D9488 0%, #10B981 100%);
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-body); color: var(--text-main); overflow: hidden; }

        /* --- SIDEBAR STYLE (Đồng bộ) --- */
        .sidebar { width: 280px; background: white; border-right: 1px solid #E2E8F0; height: 100vh; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-group-title { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #94A3B8; padding: 1.5rem 1.5rem 0.5rem; }
        .sidebar-link { display: flex; align-items: center; padding: 0.8rem 1.5rem; color: var(--text-light); font-weight: 600; font-size: 0.9rem; transition: 0.3s; gap: 12px; }
        .sidebar-link i { width: 18px; height: 18px; }
        .sidebar-link:hover { color: var(--primary); background: var(--primary-light); }
        .sidebar-link.active { background: var(--primary-gradient); color: white; border-radius: 12px; margin: 0 12px; box-shadow: 0 10px 15px -3px rgba(13, 148, 136, 0.2); }

        /* --- DASHBOARD CARDS --- */
        .bento-card { background: white; border-radius: 32px; border: 1px solid #E2E8F0; padding: 32px; transition: 0.3s; }
        
        /* --- FORM INPUTS --- */
        .form-label { display: block; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: #94A3B8; letter-spacing: 0.05em; margin-bottom: 8px; margin-left: 4px; }
        .form-input { width: 100%; padding: 14px 20px; background: #F8FAFC; border: 2px solid #F1F5F9; border-radius: 16px; font-weight: 700; color: var(--text-main); outline: none; transition: 0.3s; }
        .form-input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.1); }
        .form-input:disabled { opacity: 0.6; cursor: not-allowed; background: #F1F5F9; }

        /* --- BUTTONS --- */
        .cta-button { background: var(--primary-gradient); color: white; padding: 14px 32px; border-radius: 16px; font-weight: 800; transition: 0.3s; display: inline-flex; align-items: center; gap: 10px; border: none; cursor: pointer; box-shadow: 0 10px 20px rgba(13, 148, 136, 0.15); }
        .cta-button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(13, 148, 136, 0.25); }
        
        .btn-dark { background: #1E293B; color: white; }
        .btn-dark:hover:not(:disabled) { background: #0F172A; }

        /* --- UI COMPONENTS --- */
        .toast { transition: 0.3s; transform: translateY(100%); opacity: 0; }
        .toast.show { transform: translateY(0); opacity: 1; }
        
        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #0D9488; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="p-8">
            <a href="/index.html" class="flex items-center gap-3">
                <img src="https://i.ibb.co/JWTx6WrX/FAVICON.png" class="h-9 w-auto">
                <span class="text-xl font-black text-teal-600 tracking-tight">AIGEO</span>
            </a>
        </div>
        <nav class="flex-grow overflow-y-auto">
            <a href="index.html" class="sidebar-link"><i data-feather="grid"></i> Tổng quan</a>
            <div class="nav-group-title">Quản lý học tập</div>
            <a href="classrooms.html" class="sidebar-link"><i data-feather="book-open"></i> Lớp học của tôi</a>
            <a href="practice-hub.html" class="sidebar-link"><i data-feather="zap"></i> Luyện tập</a>
            <a href="stats.html" class="sidebar-link"><i data-feather="bar-chart-2"></i> Thống kê</a>
            <div class="nav-group-title">Khám phá</div>
            <a href="chat-bot.html" class="sidebar-link"><i data-feather="message-circle"></i> Chatbot AI</a>
            <div class="nav-group-title">Cá nhân</div>
            <a href="account.html" class="sidebar-link active"><i data-feather="user"></i> Tài khoản</a>
        </nav>
        <div class="p-4 border-t">
            <button id="logout-btn" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition">
                <i data-feather="log-out"></i> Đăng xuất
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- Header -->
        <header class="h-16 bg-white border-b flex items-center justify-between px-8 shrink-0">
            <div class="flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-widest">
                <a href="index.html" class="hover:text-teal-600 transition">Dashboard</a>
                <span>/</span>
                <span class="text-slate-800">Account Settings</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p id="user-name-header" class="text-sm font-black text-slate-800 leading-none">Đang tải...</p>
                    <span class="text-[10px] font-bold text-teal-600 uppercase tracking-tighter">Student Account</span>
                </div>
                <img id="user-avatar" class="h-10 w-10 rounded-xl border-2 border-slate-100 object-cover shadow-sm">
            </div>
        </header>

        <!-- Main Content Scroll -->
        <div class="flex-1 overflow-y-auto bg-slate-50/50 p-8">
            <div class="max-w-4xl mx-auto space-y-10">
                
                <!-- Title Section -->
                <div>
                    <h1 class="text-3xl font-black text-slate-900 tracking-tight">Thiết lập tài khoản</h1>
                    <p class="text-slate-500 font-medium">Quản lý thông tin định danh và bảo mật cá nhân.</p>
                </div>

                <div id="toast-container" class="fixed bottom-10 right-10 z-50 flex flex-col gap-3"></div>

                <!-- Profile Info Card -->
                <div class="bento-card shadow-sm border-l-4 border-l-teal-500">
                    <div class="flex items-center gap-3 mb-8">
                        <div class="w-10 h-10 bg-teal-50 text-teal-600 rounded-xl flex items-center justify-center"><i data-feather="user"></i></div>
                        <h2 class="text-xl font-black text-slate-800">Thông tin cá nhân</h2>
                    </div>
                    
                    <form id="profile-form" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-1">
                                <label class="form-label">Họ và tên học sinh</label>
                                <input id="profile-name" type="text" class="form-input" placeholder="Nguyễn Văn A" required>
                            </div>
                            <div class="space-y-1">
                                <label class="form-label">Địa chỉ Email (Cố định)</label>
                                <input id="profile-email" type="email" class="form-input" disabled>
                            </div>
                            <div class="space-y-1">
                                <label class="form-label">Trường học hiện tại</label>
                                <input id="profile-school" type="text" class="form-input" placeholder="Ví dụ: THPT Chuyên A" required>
                            </div>
                            <div class="space-y-1">
                                <label class="form-label">Khối lớp của bạn</label>
                                <div class="relative">
                                    <select id="profile-grade" class="form-input appearance-none" required>
                                        <option value="10">Lớp 10</option>
                                        <option value="11">Lớp 11</option>
                                        <option value="12">Lớp 12</option>
                                    </select>
                                    <i class="fas fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-slate-300 pointer-events-none"></i>
                                </div>
                            </div>
                        </div>
                        <div class="flex justify-end pt-4">
                            <button type="submit" class="cta-button">Lưu thông tin <i data-feather="save" class="w-4"></i></button>
                        </div>
                    </form>
                </div>

                <!-- Password Change Card -->
                <div class="bento-card shadow-sm border-l-4 border-l-slate-800">
                    <div class="flex items-center gap-3 mb-8">
                        <div class="w-10 h-10 bg-slate-100 text-slate-800 rounded-xl flex items-center justify-center"><i data-feather="shield"></i></div>
                        <h2 class="text-xl font-black text-slate-800">Thay đổi mật khẩu</h2>
                    </div>

                    <form id="password-form" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-1">
                                <label class="form-label">Mật khẩu mới</label>
                                <input id="new-password" type="password" class="form-input" placeholder="••••••••" required>
                            </div>
                            <div class="space-y-1">
                                <label class="form-label">Xác nhận mật khẩu</label>
                                <input id="confirm-password" type="password" class="form-input" placeholder="••••••••" required>
                            </div>
                        </div>
                        <div class="flex justify-end pt-4">
                            <button type="submit" class="cta-button btn-dark">Đổi mật khẩu <i data-feather="lock" class="w-4"></i></button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </main>
    
    <!-- Logic JS (GIỮ NGUYÊN TẤT CẢ LOGIC CỦA BẠN) -->
    <script src="../firebase-config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        document.addEventListener('DOMContentLoaded', () => {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            // [GIỮ NGUYÊN TOÀN BỘ BIẾN VÀ LOGIC FIREBASE CŨ CỦA BẠN]
            const userNameHeader = document.getElementById('user-name-header');
            const userAvatarEl = document.getElementById('user-avatar');
            const toastContainer = document.getElementById('toast-container');
            const profileForm = document.getElementById('profile-form');
            const passwordForm = document.getElementById('password-form');
            
            const profileNameInput = document.getElementById('profile-name');
            const profileEmailInput = document.getElementById('profile-email');
            const profileSchoolInput = document.getElementById('profile-school');
            const profileGradeSelect = document.getElementById('profile-grade');

            let currentUser = null;

            // Override hàm showToast để đẹp hơn
            const showToast = (message, type = 'success') => {
                const toast = document.createElement('div');
                toast.className = `toast show ${type === 'success' ? 'bg-slate-900' : 'bg-red-500'} text-white px-6 py-3 rounded-2xl shadow-2xl font-bold text-sm`;
                toast.textContent = message;
                toastContainer.appendChild(toast);
                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            };

            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUser = user;
                    const docSnap = await getDoc(doc(db, "users", user.uid));
                    if (docSnap.exists()) {
                        const userData = docSnap.data();
                        userNameHeader.textContent = userData.name;
                        userAvatarEl.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(userData.name)}&background=0D9488&color=fff&bold=true`;
                        
                        profileNameInput.value = userData.name || '';
                        profileEmailInput.value = user.email || '';
                        profileSchoolInput.value = userData.school || '';
                        profileGradeSelect.value = userData.grade || userData.selectedGrade || '10';
                    }
                } else { window.location.href = '../auth.html'; }
            });

            profileForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const newName = profileNameInput.value.trim();
                const newSchool = profileSchoolInput.value.trim();
                const newGrade = parseInt(profileGradeSelect.value, 10);

                if (!newName || !newSchool || !newGrade) {
                    showToast('Vui lòng điền đầy đủ tất cả thông tin.', 'error');
                    return;
                }

                const submitButton = profileForm.querySelector('button[type="submit"]');
                submitButton.disabled = true;
                submitButton.textContent = 'Đang lưu...';

                try {
                    const userDocRef = doc(db, "users", currentUser.uid);
                    await updateDoc(userDocRef, { 
                        name: newName,
                        school: newSchool,
                        grade: newGrade,
                        selectedGrade: newGrade // Keep selectedGrade for compatibility
                    });
                    showToast('Cập nhật thông tin thành công!');
                    userNameEl.textContent = newName;
                } catch (error) {
                    showToast('Đã xảy ra lỗi khi cập nhật.', 'error');
                } finally {
                    submitButton.disabled = false;
                    submitButton.textContent = 'Lưu thay đổi';
                }
            });

            passwordForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const newPassword = document.getElementById('new-password').value;
                const confirmPassword = document.getElementById('confirm-password').value;

                if (newPassword.length < 6) {
                    showToast('Mật khẩu mới phải có ít nhất 6 ký tự.', 'error');
                    return;
                }
                if (newPassword !== confirmPassword) {
                    showToast('Mật khẩu xác nhận không khớp.', 'error');
                    return;
                }
                
                const submitButton = passwordForm.querySelector('button[type="submit"]');
                submitButton.disabled = true;
                submitButton.textContent = 'Đang đổi...';

                try {
                    await updatePassword(currentUser, newPassword);
                    showToast('Đổi mật khẩu thành công!');
                    passwordForm.reset();
                } catch (error) {
                    showToast('Đã xảy ra lỗi. Vui lòng đăng xuất và đăng nhập lại rồi thử lại.', 'error');
                } finally {
                    submitButton.disabled = false;
                    submitButton.textContent = 'Đổi mật khẩu';
                }
            });
            
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    document.body.style.opacity = '0';
                    setTimeout(() => { window.location.href = this.href; }, 200);
                });
            });
            document.body.style.transition = 'opacity 0.2s ease-in-out';

            document.getElementById('logout-btn').onclick = () => signOut(auth);
            feather.replace();
        });
    </script>

<script type="text/javascript">
    // 1. Chặn Chuột phải (Để ẩn menu "Inspect/Kiểm tra" và "View Source/Xem nguồn")
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        // Không hiện thông báo gì cả để trải nghiệm mượt mà hơn
    });

    // 2. Chặn các phím tắt Developer Tools
    document.addEventListener('keydown', function(e) {
        // Chặn F12
        if (e.key === 'F12' || e.keyCode === 123) {
            e.preventDefault();
            return false;
        }

        // Chặn các tổ hợp phím Ctrl + ...
        if (e.ctrlKey) {
            switch (e.key.toLowerCase()) {
                case 'u': // Chặn Ctrl + U (Xem source code)
                case 's': // Chặn Ctrl + S (Lưu trang web)
                case 'p': // Chặn Ctrl + P (In trang web - thường hiện code)
                // Lưu ý: KHÔNG chặn 'c' (Copy) và 'a' (Select All)
                    e.preventDefault();
                    return false;
            }

            // Chặn Ctrl + Shift + ... (Các phím mở DevTools)
            if (e.shiftKey) {
                switch (e.key.toLowerCase()) {
                    case 'i': // Inspect Element
                    case 'j': // Console
                    case 'c': // Element Inspector
                        e.preventDefault();
                        return false;
                }
            }
        }
    });
</script>
</body>
</html>
