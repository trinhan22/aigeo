<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://i.ibb.co/JWTx6WrX/FAVICON.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGEO - Trợ lý AI</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/main.css">
    <script src="https://unpkg.com/feather-icons"></script>
    
    <!-- Rendering Engines -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="stylesheet" href="/src/css/student/chat-bot.css">
</head>
<body class="flex h-screen">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="p-8">
            <a href="/" class="flex items-center gap-3">
                <img src="https://i.ibb.co/JWTx6WrX/FAVICON.png" class="h-9 w-auto">
                <span class="text-xl font-black text-teal-600 tracking-tight">AIGEO</span>
            </a>
        </div>
        <nav class="flex-grow overflow-y-auto">
            <a href="index.html" class="sidebar-link"><i data-feather="grid"></i> Tổng quan</a>
            <div class="nav-group-title">Quản lý học tập</div>
            <a href="classrooms.html" class="sidebar-link"><i data-feather="book-open"></i> Lớp học của tôi</a>
            <a href="practice-hub.html" class="sidebar-link"><i data-feather="zap"></i> Luyện tập</a>
            <a href="stats.html" class="sidebar-link"><i data-feather="bar-chart-2"></i> Thống kê</a>
            <div class="nav-group-title">Khám phá</div>
            <a href="chat-bot.html" class="sidebar-link active"><i data-feather="message-circle"></i> Chatbot AI</a>
            <div class="nav-group-title">Cá nhân</div>
            <a href="account.html" class="sidebar-link"><i data-feather="user"></i> Tài khoản</a>
        </nav>
        <div class="p-4 border-t space-y-2">
            <button id="feedback-btn" class="w-full flex items-center gap-3 px-4 py-2.5 text-sm font-bold text-slate-600 hover:bg-slate-50 rounded-xl transition">
                <i data-feather="message-square" class="w-4"></i> Góp ý
            </button>
            <button id="view-feedback-btn" class="w-full flex items-center gap-3 px-4 py-2.5 text-sm font-bold text-slate-600 hover:bg-slate-50 rounded-xl transition">
                <i data-feather="inbox" class="w-4"></i> Lịch sử góp ý
            </button>
            <button id="logout-btn" class="w-full flex items-center gap-3 px-4 py-2.5 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition">
                <i data-feather="log-out" class="w-4"></i> Đăng xuất
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- Header -->
        <header class="h-16 bg-white border-b flex items-center justify-between px-8 shrink-0 z-10">
            <div class="flex items-center gap-4">
                <h2 class="text-lg font-extrabold text-slate-800 tracking-tight">
                Trợ lý thông minh <span class="text-teal-600">AIGEO</span>
                </h2>
                <button id="clear-chat-btn" class="flex items-center gap-2 px-3 py-1.5 text-[10px] font-black text-red-500 bg-red-50 hover:bg-red-100 rounded-lg transition uppercase tracking-widest">
                    <i data-feather="trash-2" class="w-3"></i> Xóa hội thoại
                </button>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p id="user-name" class="text-sm font-black text-slate-800 leading-none">Đang tải...</p>
                    <span class="text-[10px] font-bold text-teal-600 uppercase">Student Account</span>
                </div>
                <img id="user-avatar" class="h-10 w-10 rounded-xl border-2 border-slate-100 object-cover shadow-sm">
            </div>
        </header>

        <!-- Chat Main Area -->
        <div class="chat-main-container">
            <div id="chat-messages">
                <!-- Messages dynamicly injected -->
            </div>

            <!-- Typing indicator -->
            <div id="typing-indicator-container" class="hidden">
                <div class="typing-indicator-pill">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="chat-input-area">
                <div class="input-pill">
                    <textarea id="chat-input" rows="1" placeholder="Hỏi tôi bất cứ điều gì về Địa lý..."></textarea>
                    <button id="send-btn" class="send-btn" disabled>
                        <i data-feather="arrow-up" class="w-5"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Feedback Modal -->
    <div id="feedback-modal" class="fixed inset-0 z-50 items-center justify-center hidden modal-backdrop p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-lg shadow-2xl">
            <h2 class="text-2xl font-black text-slate-800 mb-2">Gửi góp ý</h2>
            <p class="text-sm text-slate-500 mb-6">Ý kiến của bạn giúp AIGEO hoàn thiện hơn mỗi ngày.</p>
            <form id="feedback-form">
                <textarea id="feedback-content" rows="5" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-teal-500 outline-none transition font-medium" placeholder="Bạn muốn chúng tôi cải thiện điều gì?" required></textarea>
                <div class="flex justify-end gap-3 mt-6">
                    <button type="button" id="feedback-cancel-btn" class="px-6 py-2.5 font-bold text-slate-400">Hủy</button>
                    <button type="submit" id="feedback-submit-btn" class="bg-teal-600 text-white px-6 py-2.5 rounded-xl font-bold shadow-lg shadow-teal-600/20">Gửi ngay</button>
                </div>
            </form>
        </div>
    </div>

    <!-- History Feedback Modal -->
    <div id="view-feedback-modal" class="fixed inset-0 z-50 items-center justify-center hidden modal-backdrop p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-2xl shadow-2xl max-h-[80vh] flex flex-col">
            <h2 class="text-2xl font-black text-slate-800 mb-6">Lịch sử góp ý</h2>
            <div id="feedback-list-container" class="flex-grow overflow-y-auto space-y-4 pr-2"></div>
            <button id="view-feedback-close-btn" class="mt-6 w-full py-3 font-bold bg-slate-100 text-slate-600 rounded-xl">Đóng</button>
        </div>
    </div>

    <script type="module" src="../firebase-config.js"></script>
    <script type="module" src="/src/js/student/chat-bot.js"></script>


</body>
</html>
