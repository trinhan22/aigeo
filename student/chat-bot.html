<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://i.ibb.co/JWTx6WrX/FAVICON.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGEO - Trợ lý AI</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    
    <!-- Rendering Engines -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --primary: #0D9488;
            --primary-light: #F0FDFA;
            --secondary: #10B981;
            --text-main: #1E293B;
            --text-light: #64748B;
            --bg-body: #F8FAFC;
            --primary-gradient: linear-gradient(135deg, #0D9488 0%, #10B981 100%);
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-body); color: var(--text-main); overflow: hidden; }

        /* --- SIDEBAR STYLE (Đồng bộ) --- */
        .sidebar { width: 280px; background: white; border-right: 1px solid #E2E8F0; height: 100vh; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-group-title { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #94A3B8; padding: 1.5rem 1.5rem 0.5rem; }
        .sidebar-link { display: flex; align-items: center; padding: 0.8rem 1.5rem; color: var(--text-light); font-weight: 600; font-size: 0.9rem; transition: 0.3s; gap: 12px; }
        .sidebar-link i { width: 18px; height: 18px; }
        .sidebar-link:hover { color: var(--primary); background: var(--primary-light); }
        .sidebar-link.active { background: var(--primary-gradient); color: white; border-radius: 12px; margin: 0 12px; box-shadow: 0 10px 15px -3px rgba(13, 148, 136, 0.2); }

        /* --- CHAT AREA STYLE --- */
        .chat-main-container { flex: 1; display: flex; flex-direction: column; background: white; border-radius: 32px 0 0 0; border: 1px solid #E2E8F0; border-bottom: none; border-right: none; overflow: hidden; }
        #chat-messages { flex-grow: 1; overflow-y: auto; padding: 32px; scroll-behavior: smooth; background-image: radial-gradient(#f1f5f9 1.5px, transparent 1px); background-size: 24px 24px; }
        
        /* Message Bubbles */
        .message-wrapper { margin-bottom: 24px; animation: slideUp 0.4s ease forwards; opacity: 0; display: flex; align-items: flex-start; gap: 12px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .message-content { max-width: 80%; padding: 16px 20px; border-radius: 24px; font-size: 0.95rem; line-height: 1.6; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        
        .user { flex-direction: row-reverse; }
        .user .message-content { background: var(--primary-gradient); color: white; border-bottom-right-radius: 4px; }
        
        .bot .message-content { background: white; border: 1px solid #E2E8F0; border-bottom-left-radius: 4px; color: var(--text-main); }
        
        .avatar-chat { width: 36px; height: 36px; border-radius: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem; }
        .bot .avatar-chat { background: var(--primary-gradient); color: white; }
        .user .avatar-chat { background: #E2E8F0; color: #64748B; }

        /* Input Area Pill */
        .chat-input-area { background: white; padding: 20px 32px 32px; border-top: 1px solid #F1F5F9; }
        .input-pill-wrapper { background: #F8FAFC; border: 2px solid #F1F5F9; border-radius: 24px; padding: 8px 12px 8px 24px; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .input-pill-wrapper:focus-within { border-color: var(--primary); background: white; box-shadow: 0 10px 30px rgba(13, 148, 136, 0.1); }
        #chat-input { flex-grow: 1; border: none; outline: none; padding: 10px 0; font-size: 0.95rem; background: transparent; font-weight: 500; resize: none; max-height: 200px; }
        
        .send-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--primary-gradient); color: white; display: flex; align-items: center; justify-content: center; transition: 0.3s; border: none; cursor: pointer; }
        .send-btn:hover:not(:disabled) { transform: scale(1.05) rotate(-10deg); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Typing indicator */
        .typing-pill { display: flex; gap: 4px; padding: 10px 18px; background: #F1F5F9; border-radius: 20px; width: fit-content; margin-bottom: 20px; }
        .dot { width: 6px; height: 6px; background: #94A3B8; border-radius: 50%; animation: bounce 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

        /* Prose Overrides for Markdown */
        .prose p { margin-bottom: 0.5rem; }
        .prose ul, .prose ol { padding-left: 1.25rem; margin: 0.5rem 0; }
        
        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #0D9488; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="p-8">
            <a href="/index.html" class="flex items-center gap-3">
                <img src="https://i.ibb.co/JWTx6WrX/FAVICON.png" class="h-9 w-auto">
                <span class="text-xl font-black text-teal-600 tracking-tight">AIGEO</span>
            </a>
        </div>
        <nav class="flex-grow overflow-y-auto">
            <a href="index.html" class="sidebar-link"><i data-feather="home"></i> Tổng quan</a>
            <div class="nav-group-title">Quản lý học tập</div>
            <a href="classrooms.html" class="sidebar-link"><i data-feather="book-open"></i> Lớp học của tôi</a>
            <a href="practice-hub.html" class="sidebar-link"><i data-feather="zap"></i> Luyện tập</a>
            <a href="stats.html" class="sidebar-link"><i data-feather="bar-chart-2"></i> Thống kê</a>
            <div class="nav-group-title">Khám phá</div>
            <a href="chat-bot.html" class="sidebar-link active"><i data-feather="message-circle"></i> Chatbot AI</a>
            <div class="nav-group-title">Cá nhân</div>
            <a href="account.html" class="sidebar-link"><i data-feather="user"></i> Tài khoản</a>
        </nav>
        <div class="p-4 border-t">
            <button id="logout-btn" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition">
                <i data-feather="log-out"></i> Đăng xuất
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- Header -->
        <header class="h-16 bg-white border-b flex items-center justify-between px-8 shrink-0 z-10">
            <div class="flex items-center gap-4">
                <h2 class="text-lg font-extrabold text-slate-800">Trợ lý AI Geo</h2>
                <button id="clear-chat-btn" class="flex items-center gap-2 px-3 py-1.5 text-[10px] font-black text-red-500 bg-red-50 hover:bg-red-100 rounded-lg transition uppercase tracking-widest">
                    <i data-feather="trash-2" class="w-3"></i> Xóa hội thoại
                </button>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p id="user-name" class="text-sm font-black text-slate-800 leading-none">Đang tải...</p>
                    <span class="text-[10px] font-bold text-teal-600 uppercase tracking-tighter">Student Account</span>
                </div>
                <img id="user-avatar" class="h-10 w-10 rounded-xl border-2 border-slate-100 object-cover shadow-sm">
            </div>
        </header>

        <!-- Chat Workspace -->
        <div class="chat-main-container">
            <div id="chat-messages">
                <!-- Messages dynamicly injected -->
            </div>

            <!-- Input Area -->
            <div class="chat-input-area">
                <div class="max-w-4xl mx-auto">
                    <!-- Typing indicator -->
                    <div id="typing-indicator-container" class="hidden">
                        <div class="typing-pill">
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>
                    </div>

                    <div class="input-pill-wrapper">
                        <textarea id="chat-input" rows="1" placeholder="Hỏi tôi bất cứ điều gì về Địa lý..."></textarea>
                        <button id="send-btn" class="send-btn">
                            <i data-feather="arrow-up" class="w-5"></i>
                        </button>
                    </div>
                    <p class="text-[10px] text-center text-slate-400 font-bold mt-4 uppercase tracking-widest">Hệ thống AI có thể đưa ra câu trả lời không chính xác. Hãy kiểm tra lại thông tin.</p>
                </div>
            </div>
        </div>
    </main>

    <script src="../firebase-config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp, updateDoc, deleteField } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        document.addEventListener('DOMContentLoaded', () => {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            // [LOGIC GIỮ NGUYÊN TỪ FILE CỦA BẠN]
            let currentUser = null, chatHistory = [];
            let openRouterKeys = [], currentKeyIndex = 0;
            let userName = 'Học sinh', nameInitial = 'S';
            
            const getNextApiKey = () => {
                if (openRouterKeys.length === 0) return null;
                const key = openRouterKeys[currentKeyIndex];
                currentKeyIndex = (currentKeyIndex + 1) % openRouterKeys.length;
                sessionStorage.setItem('orKeyIndex', currentKeyIndex.toString());
                return key;
            };

            const userNameEl = document.getElementById('user-name');
            const userAvatarEl = document.getElementById('user-avatar');
            const chatMessages = document.getElementById('chat-messages');
            const chatInput = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-btn');
            const typingIndicator = document.getElementById('typing-indicator-container');
            const clearChatBtn = document.getElementById('clear-chat-btn');
        
            onAuthStateChanged(auth, async (user) => {
                if (!user) { window.location.href = '../auth.html'; return; }
                currentUser = user;
                const userDocSnap = await getDoc(doc(db, "users", user.uid));
                if (userDocSnap.exists() && userDocSnap.data().role === 'student') {
                    const userData = userDocSnap.data();
                    userName = userData.name || 'Học sinh';
                    nameInitial = (userData.name || 'S').charAt(0).toUpperCase();
                    userNameEl.textContent = userName;
                    userAvatarEl.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(userName)}&background=0D9488&color=fff&bold=true`;
                    
                    await loadApiKeys();
                    await loadChatHistory();
                    setupEventListeners();

                    // FIX: HIỂN THỊ CÂU CHÀO MỞ ĐẦU NẾU LỊCH SỬ TRỐNG
                    if (chatHistory.length === 0) {
                        addMessage("Chào bạn, tôi là trợ lý AI của AIGEO. Tôi chỉ có thể trả lời các câu hỏi liên quan đến Địa lý. Tôi có thể giúp gì cho bạn?", "assistant");
                    }
                } else {
                     window.location.href = `../${userDocSnap.data()?.role || 'auth'}/index.html`;
                }
            });
            
            async function loadApiKeys() {
                 const apiKeySnap = await getDoc(doc(db, "system_settings", "api_keys"));
                if (apiKeySnap.exists() && apiKeySnap.data().openrouter_keys && apiKeySnap.data().openrouter_keys.length > 0) {
                    openRouterKeys = apiKeySnap.data().openrouter_keys;
                    currentKeyIndex = parseInt(sessionStorage.getItem('orKeyIndex') || '0', 10) % openRouterKeys.length;
                }
            }

            async function loadChatHistory() {
                const chatSessionRef = doc(db, "chat_sessions", currentUser.uid);
                const chatDoc = await getDoc(chatSessionRef);
                if (chatDoc.exists()) {
                    chatHistory = chatDoc.data().history || [];
                    chatMessages.innerHTML = '';
                    chatHistory.forEach(msg => addMessage(msg.content, msg.role, true));
                }
                setTimeout(() => chatMessages.scrollTop = chatMessages.scrollHeight, 100);
            }

            async function saveChatHistory(newHistory) {
                const chatSessionRef = doc(db, "chat_sessions", currentUser.uid);
                await setDoc(chatSessionRef, { history: newHistory, lastUpdated: serverTimestamp() }, { merge: true });
                chatHistory = newHistory;
            }
            
            function renderContent(element, text) {
                const safeText = text || "";
                const rawHtml = marked.parse(safeText);
                element.innerHTML = rawHtml;
                renderMathInElement(element, { 
                    delimiters: [
                        {left: "$$", right: "$$", display: true}, 
                        {left: "$", right: "$", display: false}
                    ]
                });
            }

            // [HÀM ADD MESSAGE ĐÃ ĐƯỢC TỐI ƯU GIAO DIỆN MỚI]
            function addMessage(text, role, isLoading = false) {
                const isUser = role === 'user';
                const messageWrapper = document.createElement('div');
                messageWrapper.className = `message-wrapper ${isUser ? 'user' : 'bot'}`;
                
                messageWrapper.innerHTML = `
                    <div class="avatar-chat shadow-sm">
                        ${isUser ? nameInitial : '<i class="fas fa-robot"></i>'}
                    </div>
                    <div class="message-content prose">
                        ${marked.parse(text)}
                    </div>
                `;
                
                chatMessages.appendChild(messageWrapper);
                renderMathInElement(messageWrapper, { delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}] });
                
                if(!isLoading) chatMessages.scrollTop = chatMessages.scrollHeight;
                feather.replace();
                return messageWrapper;
            }
            
            function setChatInputDisabled(isDisabled) {
                chatInput.disabled = isDisabled;
                sendBtn.disabled = isDisabled;
            }

            async function handleSendMessage() {
                const userInput = chatInput.value.trim();
                if (!userInput) return;
                
                setChatInputDisabled(true);
                typingIndicator.classList.remove('hidden');
                typingIndicator.classList.add('flex');
                
                try {
                    const newHistory = [...chatHistory, { role: 'user', content: userInput }];
                    addMessage(userInput, "user");
                    chatInput.value = '';
                    chatInput.style.height = 'auto'; // Reset height sau khi gửi
                    chatMessages.scrollTop = chatMessages.scrollHeight;

                    const aiResponse = await getOpenRouterResponse(newHistory); 
                    
                    const finalHistory = [...newHistory, { role: 'assistant', content: aiResponse }];
                    addMessage(aiResponse, 'assistant');
                    await saveChatHistory(finalHistory);
                    
                } catch (error) {
                    addMessage(`Rất tiếc, đã có lỗi xảy ra: ${error.message}`, 'assistant');
                } finally {
                    setChatInputDisabled(false);
                    typingIndicator.classList.add('hidden');
                    chatInput.focus();
                }
            }
            
            async function getOpenRouterResponse(history) {
                const MAX_RETRIES = 3;
                let lastError = null;

                const messagesToSend = [
                    { 
                        role: "system", 
                        content: "Bạn là một trợ lý AI chuyên gia về Địa lý cho AIGEO. Trả lời các câu hỏi liên quan đến Địa lý bằng tiếng Việt. Nếu học sinh hỏi chủ đề khác, hãy từ chối lịch sự. Sử dụng Markdown và KaTeX." 
                    },
                    ...history 
                ];

                for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
                    const apiKey = getNextApiKey();
                    if (!apiKey) break;
                    const API_URL = "https://openrouter.ai/api/v1/chat/completions";
                    try {
                        const response = await fetch(API_URL, {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${apiKey}`,
                                'Content-Type': 'application/json',
                                'HTTP-Referer': `https://aigeo.web.app`,
                                'X-Title': 'AIGEO Chat'
                            },
                            body: JSON.stringify({
                                model: "openai/gpt-oss-20b:free",
                                messages: messagesToSend
                            })
                        });
                        if (response.ok) {
                            const result = await response.json();
                            return result.choices[0]?.message?.content.trim();
                        }
                    } catch (error) {
                        lastError = error;
                        if (attempt < MAX_RETRIES) await new Promise(res => setTimeout(res, 2000));
                    }
                }
                throw lastError || new Error("AI không phản hồi.");
            }
            
            async function handleClearChat() {
                if(confirm("Bạn có chắc chắn muốn xóa toàn bộ lịch sử trò chuyện không?")) {
                    try {
                        const chatSessionRef = doc(db, "chat_sessions", currentUser.uid);
                        await updateDoc(chatSessionRef, { history: deleteField() });
                        chatHistory = [];
                        chatMessages.innerHTML = '';
                        addMessage("Chào bạn, tôi là trợ lý AI của AIGEO. Tôi có thể giúp gì cho bạn về Địa lý?", "assistant");
                    } catch (error) { console.error(error); }
                }
            }
            
            function setupEventListeners() {
                sendBtn.onclick = handleSendMessage;
                clearChatBtn.onclick = handleClearChat;
                
                chatInput.onkeydown = (e) => {
                    if (e.key === 'Enter' && !e.shiftKey && !chatInput.disabled) {
                        e.preventDefault();
                        handleSendMessage();
                    }
                };

                chatInput.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = (this.scrollHeight) + 'px';
                });

                document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));
            }
            
            feather.replace();
        });
    </script>
</body>
</html>
