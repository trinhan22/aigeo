<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://i.ibb.co/JWTx6WrX/FAVICON.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGEO - Luyện tập</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/main.css">
    <script src="https://unpkg.com/feather-icons"></script>
    
    <!-- Rendering Engines -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <link rel="stylesheet" href="/src/css/student/practice-test.css">
</head>
<body>

    <!-- Top Navigation Header -->
    <header>
        <div class="flex items-center gap-4 flex-1">
            <img id="user-avatar" class="h-10 w-10 rounded-xl bg-slate-100 object-cover">
            <div>
                <h1 id="test-name-header" class="font-black text-slate-800 leading-tight">Đang tải đề...</h1>
                <p id="user-name" class="text-[10px] font-bold text-teal-600 uppercase tracking-widest">AIGEO Student</p>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="timer-pill">
                <i data-feather="clock" class="w-4 h-4 text-teal-600"></i>
                <span id="timer">00:00</span>
            </div>
            <!-- Mobile Map Toggle -->
            <label for="question-map-toggle" class="md:hidden p-2 bg-slate-100 rounded-lg cursor-pointer">
                <i data-feather="grid" class="w-5 h-5"></i>
            </label>
        </div>

        <div class="progress-container">
            <div id="progress-bar" style="width: 0%"></div>
        </div>
    </header>

    <div class="main-layout">
        <!-- Main Question Area -->
        <main class="content-scroll">
            <div class="max-w-3xl mx-auto" id="main-content-area">
                <div class="text-center py-20">
                    <div class="animate-spin rounded-full h-12 w-12 border-4 border-teal-500 border-t-transparent mx-auto"></div>
                    <p class="mt-4 text-slate-400 font-bold">Đang chuẩn bị câu hỏi...</p>
                </div>
            </div>
        </main>

        <!-- Right Sidebar: Question Map -->
        <input type="checkbox" id="question-map-toggle" class="hidden">
        <aside id="question-map">
            <label for="question-map-toggle" class="md:hidden absolute top-5 left-5 w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full">
                <i data-feather="x" class="w-5 h-5"></i>
            </label>
            <div class="mb-6 flex justify-between items-center">
                <h2 class="font-black text-slate-800">Danh sách câu hỏi</h2>
                <span id="progress-text" class="text-[10px] font-black bg-teal-50 text-teal-600 px-2 py-1 rounded">0/0</span>
            </div>
            
            <div id="question-grid" class="question-grid">
                <!-- Grid items generated by JS -->
            </div>

            <button id="submit-btn" class="btn-submit">
                Nộp bài ngay <i class="fas fa-paper-plane ml-2 text-xs"></i>
            </button>
        </aside>
    </div>

    <script type="module" src="../firebase-config.js"></script>
    <script type="module" src="/src/js/student/practice-test.js"></script>


</body>
</html>
