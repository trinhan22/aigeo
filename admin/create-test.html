<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://i.ibb.co/JWTx6WrX/FAVICON.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Đề thi - AIGEO</title>
    <link rel="stylesheet" href="/src/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/src/css/admin/create-test.css">
</head>
<body class="flex h-screen">

    <aside class="admin-sidebar shadow-sm flex-shrink-0 overflow-hidden">
        <!-- Brand Logo -->
        <div class="brand-box">
            <a href="/index.html" class="flex items-center gap-3 group">
                <div class="w-10 h-10 bg-teal-600 rounded-xl flex items-center justify-center shadow-lg shadow-teal-600/20 group-hover:rotate-12 transition-transform">
                    <img src="https://i.ibb.co/JWTx6WrX/FAVICON.png" class="h-6 w-auto brightness-0 invert" alt="Logo">
                </div>
                <div class="flex flex-col text-left">
                    <span class="text-xl font-black text-slate-800 tracking-tighter leading-none">AIGEO</span>
                    <span class="text-[10px] font-bold text-teal-600 uppercase tracking-widest mt-1">Admin Panel</span>
                </div>
            </a>
        </div>

        <!-- Navigation Scroll Area -->
        <nav class="flex-grow overflow-y-auto pb-10">
            <!-- Nhóm 1 -->
            <p class="nav-section-title">Báo cáo</p>
            <a href="index.html" class="nav-item">
                <i data-feather="grid"></i> Tổng quan
            </a>

            <!-- Nhóm 2 -->
            <p class="nav-section-title">Quản trị dữ liệu</p>
            <div class="space-y-1">
                <a href="users.html" class="nav-item">
                    <i data-feather="users"></i> Quản lý Người dùng
                </a>
                <a href="subjects.html" class="nav-item">
                    <i data-feather="book-open"></i> Quản lý Học liệu
                </a>
                <a href="questions.html" class="nav-item">
                    <i data-feather="help-circle"></i> Quản lý Câu hỏi
                </a>
                <a href="tests.html" class="nav-item active">
                    <i data-feather="file-text"></i> Quản lý Đề thi
                </a>
            </div>

            <!-- Nhóm 3 -->
            <p class="nav-section-title">Kỹ thuật</p>
            <div class="space-y-1">
                <a href="apikeys.html" class="nav-item">
                    <i data-feather="key"></i> Quản lý API Key
                </a>
                <a href="feedback.html" class="nav-item">
                    <i data-feather="message-square"></i> Quản lý Góp ý
                </a>
                <a href="settings.html" class="nav-item">
                    <i data-feather="settings"></i> Cài đặt hệ thống
                </a>
            </div>
        </nav>

        <!-- Footer Logout -->
        <div class="p-6 bg-slate-50/50 mt-auto border-t">
            <button id="logout-btn" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition-all">
                <i data-feather="log-out"></i> Đăng xuất
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white shadow-sm h-16 flex items-center justify-end px-6">
            <div class="flex items-center">
                <span id="user-name" class="font-semibold text-gray-700 mr-4">Đang tải...</span>
                <img id="user-avatar" class="h-10 w-10 rounded-full object-cover" src="https://placehold.co/40x40/E2E8F0/475569?text=A" alt="Admin Avatar" onerror="this.onerror=null; this.src='https://placehold.co/40x40/f87171/ffffff?text=Lỗi';">
            </div>
        </header>
        <div class="flex-1 overflow-x-hidden overflow-y-auto bg-slate-100 p-8">
            <div class="max-w-4xl mx-auto">
                <div class="flex items-center mb-6">
                    <a href="tests.html" class="p-2 mr-2 hover:bg-slate-200 rounded-full"><i data-feather="arrow-left"></i></a>
                    <h1 id="page-title" class="text-3xl font-bold text-slate-800">Tạo đề thi mới - Bước 1</h1>
                </div>
                
                <div class="bg-white p-6 rounded-lg shadow-sm">
                    <form id="test-form" class="space-y-6">
                        <div>
                            <h2 class="text-lg font-semibold text-slate-800 border-b pb-2">Thông tin chung</h2>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
                                <div class="md:col-span-2">
                                    <label for="test-name" class="block text-sm font-medium text-gray-700">Tên đề thi</label>
                                    <input type="text" id="test-name" class="form-input" required>
                                </div>
                                <div>
                                    <label for="test-type" class="block text-sm font-medium text-gray-700">Loại đề thi</label>
                                    <select id="test-type" class="form-input">
                                        <option value="practice">Đề luyện tập</option>
                                        <option value="15_min">Kiểm tra 15 phút</option>
                                        <option value="45_min">Kiểm tra 1 tiết</option>
                                        <option value="mid_term">Kiểm tra giữa kỳ</option>
                                        <option value="final_term">Kiểm tra cuối kỳ</option>
                                        <option value="thptqg">Đề luyện thi THPTQG</option>
                                    </select>
                                </div>
                                 <div>
                                    <label for="test-subject" class="block text-sm font-medium text-gray-700">Môn học</label>
                                    <select id="test-subject" class="form-input"></select>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-6 flex justify-end space-x-3 border-t pt-4">
                             <button type="button" id="test-cancel-btn" class="bg-gray-200 text-gray-800 px-4 py-2 rounded-md">Hủy</button>
                             <button type="submit" form="test-form" id="test-submit-btn" class="cta-button text-white px-4 py-2 rounded-md">Tiếp tục</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 space-y-2"></div>
    
    <script type="module" src="../firebase-config.js"></script>
    <script type="module" src="/src/js/admin/create-test.js"></script>
</body>
</html>
