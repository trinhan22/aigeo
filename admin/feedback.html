<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://i.ibb.co/JWTx6WrX/FAVICON.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Góp ý - AIGEO</title>
    <link rel="stylesheet" href="/src/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="/src/css/admin/feedback.css">
</head>
<body class="flex h-screen">

    <aside class="admin-sidebar shadow-sm flex-shrink-0 overflow-hidden">
        <!-- Brand Logo -->
        <div class="brand-box">
            <a href="/index.html" class="flex items-center gap-3 group">
                <div class="w-10 h-10 bg-teal-600 rounded-xl flex items-center justify-center shadow-lg shadow-teal-600/20 group-hover:rotate-12 transition-transform">
                    <img src="https://i.ibb.co/JWTx6WrX/FAVICON.png" class="h-6 w-auto brightness-0 invert" alt="Logo">
                </div>
                <div class="flex flex-col text-left">
                    <span class="text-xl font-black text-slate-800 tracking-tighter leading-none">AIGEO</span>
                    <span class="text-[10px] font-bold text-teal-600 uppercase tracking-widest mt-1">Admin Panel</span>
                </div>
            </a>
        </div>

        <!-- Navigation Scroll Area -->
        <nav class="flex-grow overflow-y-auto pb-10">
            <!-- Nhóm 1 -->
            <p class="nav-section-title">Báo cáo</p>
            <a href="index.html" class="nav-item">
                <i data-feather="grid"></i> Tổng quan
            </a>

            <!-- Nhóm 2 -->
            <p class="nav-section-title">Quản trị dữ liệu</p>
            <div class="space-y-1">
                <a href="users.html" class="nav-item">
                    <i data-feather="users"></i> Quản lý Người dùng
                </a>
                <a href="subjects.html" class="nav-item">
                    <i data-feather="book-open"></i> Quản lý Học liệu
                </a>
                <a href="questions.html" class="nav-item">
                    <i data-feather="help-circle"></i> Quản lý Câu hỏi
                </a>
                <a href="tests.html" class="nav-item">
                    <i data-feather="file-text"></i> Quản lý Đề thi
                </a>
            </div>

            <!-- Nhóm 3 -->
            <p class="nav-section-title">Kỹ thuật</p>
            <div class="space-y-1">
                <a href="apikeys.html" class="nav-item">
                    <i data-feather="key"></i> Quản lý API Key
                </a>
                <a href="feedback.html" class="nav-item active">
                    <i data-feather="message-square"></i> Quản lý Góp ý
                </a>
                <a href="settings.html" class="nav-item">
                    <i data-feather="settings"></i> Cài đặt hệ thống
                </a>
            </div>
        </nav>

        <!-- Footer Logout -->
        <div class="p-6 bg-slate-50/50 mt-auto border-t">
            <button id="logout-btn" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition-all">
                <i data-feather="log-out"></i> Đăng xuất
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white shadow-sm h-16 flex items-center justify-end px-6">
            <div class="flex items-center">
                <span id="user-name" class="font-semibold text-gray-700 mr-4">Đang tải...</span>
                <img id="user-avatar" class="h-10 w-10 rounded-full object-cover" src="https://placehold.co/40x40/E2E8F0/475569?text=A" alt="Admin Avatar">
            </div>
        </header>
        <div class="flex-1 overflow-x-hidden overflow-y-auto bg-slate-100 p-8">
            <div class="max-w-7xl mx-auto">
                <h1 class="text-3xl font-bold text-slate-800">Quản lý Góp ý</h1>
                <p class="mt-2 text-slate-600">Xem và phản hồi các góp ý từ người dùng.</p>

                <div class="mt-8">
                    <div class="border-b border-gray-200">
                        <nav id="tabs-container" class="-mb-px flex space-x-8" aria-label="Tabs">
                            <button class="tab-button active" data-status="new">Mới</button>
                            <button class="tab-button" data-status="seen">Đã xem</button>
                            <button class="tab-button" data-status="replied">Đã trả lời</button>
                        </nav>
                    </div>
                    <div id="feedback-list-container" class="mt-6 space-y-4">
                        <div class="skeleton h-24 w-full"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="reply-modal" class="fixed inset-0 z-50 items-center justify-center hidden modal-backdrop">
        <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-lg modal-content">
            <h2 class="text-xl font-bold text-slate-800 mb-4">Phản hồi Góp ý</h2>
            <div class="mb-4 bg-slate-50 p-4 rounded-lg border">
                <p class="text-sm font-semibold text-slate-600">Nội dung gốc:</p>
                <p id="original-feedback-content" class="mt-2 text-slate-800 whitespace-pre-wrap"></p>
            </div>
            <form id="reply-form">
                <textarea id="reply-content" rows="5" class="w-full p-3 border border-slate-300 rounded-lg" placeholder="Nhập nội dung phản hồi của bạn..." required></textarea>
                <div class="flex justify-end space-x-3 mt-6">
                    <button type="button" id="reply-cancel-btn" class="bg-slate-200 text-slate-800 px-4 py-2 rounded-lg hover:bg-slate-300 font-semibold">Hủy</button>
                    <button type="submit" id="reply-submit-btn" class="cta-button text-white px-4 py-2 rounded-lg font-semibold">Gửi phản hồi</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 space-y-2"></div>

    <script type="module" src="../firebase-config.js"></script>
    <script type="module" src="/src/js/admin/feedback.js"></script>
</body>
</html>
