<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ Vẽ hình TikZ & AI - Chính xác cao</title>
    <link rel="stylesheet" href="/src/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    
    <link rel="stylesheet" type="text/css" href="https://tikzjax.com/v1/fonts.css">
    <script src="https://tikzjax.com/v1/tikzjax.js"></script>

    <link rel="stylesheet" href="/src/css/test-web.css">
</head>
<body class="p-8">
    <div class="max-w-5xl mx-auto">
        <div class="text-center">
            <h1 class="text-4xl font-bold text-slate-800">Công cụ Vẽ hình bằng AI (Chính xác cao)</h1>
            <p class="mt-2 text-slate-600">Mô tả hình học, AI sẽ tạo mã TikZ 2D với độ chính xác tối ưu.</p>
        </div>

        <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
            <div class="bg-white p-6 rounded-xl shadow-lg space-y-6">
                <div>
                    <label for="api-key" class="block text-sm font-medium text-gray-700">
                        <i data-feather="key" class="inline-block w-4 h-4 mr-1"></i>Gemini API Key
                    </label>
                    <input type="password" id="api-key" class="form-input w-full mt-1" placeholder="Dán API Key của bạn vào đây">
                </div>

                <div>
                    <label for="description-input" class="block text-sm font-medium text-gray-700">
                         <i data-feather="edit-3" class="inline-block w-4 h-4 mr-1"></i>Mô tả hình vẽ
                    </label>
                    <textarea id="description-input" rows="6" class="form-input w-full mt-1" placeholder="Ví dụ: Vẽ hình chóp S.ABC có đáy là tam giác vuông tại B, SA vuông góc với đáy."></textarea>
                </div>
                 <div>
                    <button id="generate-btn" class="w-full flex justify-center items-center bg-blue-600 text-white font-semibold py-3 px-6 rounded-lg hover:bg-blue-700 transition disabled:bg-slate-400 disabled:cursor-wait">
                        <i data-feather="cpu" class="mr-2"></i>
                        <span>Vẽ hình</span>
                    </button>
                </div>
            </div>

             <div id="result-area" class="bg-white p-6 rounded-xl shadow-lg min-h-[360px]">
                 <h2 class="text-xl font-bold text-slate-800">Kết quả</h2>
                 <div id="result-content" class="mt-4">
                     <div class="flex items-center justify-center h-64 text-slate-400">
                        <p>Hình vẽ sẽ xuất hiện ở đây...</p>
                     </div>
                 </div>
            </div>
        </div>
    </div>

    <script type="module" src="/src/js/test-web.js"></script>
</body>
</html>
