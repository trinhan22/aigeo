<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://i.ibb.co/JWTx6WrX/FAVICON.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả bài làm - AIGEO</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/src/main.css">
    <script src="https://unpkg.com/feather-icons"></script>
    
    <!-- Rendering Engine -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="stylesheet" href="/src/css/client/client-result.css">
</head>
<body>
    <canvas id="confetti-canvas"></canvas>

    <header class="h-20 flex items-center justify-between px-8 bg-white/80 backdrop-blur-md border-b sticky top-0 z-50">
        <a href="javascript:history.back()" class="flex items-center gap-3">
            <img src="https://i.ibb.co/JWTx6WrX/FAVICON.png" class="h-10" alt="Logo">
            <span class="text-xl font-black text-teal-600">AIGEO</span>
        </a>
        <div class="flex gap-3">
            <a href="client-practice.html" class="btn-modern btn-secondary text-sm">Luyện tập tiếp</a>
            <a href="/auth.html" class="btn-modern btn-primary text-sm shadow-none">Đăng ký ngay</a>
        </div>
    </header>

    <main class="max-w-5xl mx-auto py-12 px-6">
        <!-- Result Header -->
        <div class="mb-12 text-center md:text-left">
            <h1 id="test-name-title" class="text-4xl font-black text-slate-900 tracking-tight mb-4">Kết quả bài luyện tập</h1>
            <p class="text-slate-500 font-medium">Hệ thống AI đã phân tích chi tiết bài làm của bạn.</p>
        </div>

        <!-- Bento Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
            <div class="stat-card flex flex-col items-center justify-center border-b-4 border-b-teal-500">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Điểm số</span>
                <div id="score-display" class="text-5xl font-black text-teal-600">--</div>
            </div>
            <div class="stat-card flex flex-col items-center justify-center">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Đúng/Tổng</span>
                <div id="raw-score-display" class="text-2xl font-black text-slate-700">--/--</div>
            </div>
            <div class="stat-card flex flex-col items-center justify-center">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Thời gian</span>
                <div id="time-taken-display" class="text-2xl font-black text-slate-700">--:--</div>
            </div>
            <div class="stat-card flex flex-col items-center justify-center">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Ngày làm</span>
                <div id="completed-at-display" class="text-lg font-black text-slate-700">--/--</div>
            </div>
        </div>

        <!-- AI Analysis & Topics -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-16">
            <div class="lg:col-span-2 ai-feedback-container shadow-sm">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-10 h-10 bg-teal-600 text-white rounded-xl flex items-center justify-center"><i class="fas fa-robot"></i></div>
                    <h2 class="text-xl font-extrabold text-slate-900">Nhận xét từ trợ lý AIGEO</h2>
                </div>
                <div id="ai-feedback" class="prose prose-teal text-slate-600 font-medium leading-relaxed">
                    <div class="space-y-3">
                        <div class="skeleton h-4 w-full"></div>
                        <div class="skeleton h-4 w-3/4"></div>
                    </div>
                </div>
            </div>

            <div class="stat-card bg-white">
                <h3 class="font-black text-slate-900 mb-6 flex items-center gap-2">
                    <i class="fas fa-list-check text-teal-600"></i> Chủ đề cần ôn lại
                </h3>
                <ul id="review-topics" class="space-y-3">
                    <li class="skeleton h-10 w-full"></li>
                </ul>
            </div>
        </div>

        <!-- Detailed Review Section -->
        <div class="mb-10 flex items-center justify-between">
            <h2 class="text-2xl font-black text-slate-900">Xem lại chi tiết</h2>
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-teal-500"></span> <span class="text-xs font-bold text-slate-500 mr-4">Đúng</span>
                <span class="w-3 h-3 rounded-full bg-red-500"></span> <span class="text-xs font-bold text-slate-500">Sai</span>
            </div>
        </div>

        <div id="review-container" class="space-y-6">
            <!-- Questions will be injected here -->
        </div>
    </main>

    <script type="module" src="../firebase-config.js"></script>
    <script type="module" src="/src/js/client/client-result.js"></script>


</body>
</html>
