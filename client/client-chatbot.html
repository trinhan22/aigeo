<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://i.ibb.co/JWTx6WrX/FAVICON.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGEO - Trợ lý AI</title>
    
    <!-- Fonts & Libraries -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    
    <!-- Rendering Engine -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --primary: #0D9488;
            --primary-dark: #0F766E;
            --secondary: #10B981;
            --text-main: #1E293B;
            --text-light: #64748B;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.8);
            --primary-gradient: linear-gradient(135deg, #0D9488 0%, #10B981 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { color: var(--text-main); background-color: #F8FAFC; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* --- BACKGROUND BLOBS --- */
        .background-blobs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.1; animation: floatBlob 10s infinite alternate; }
        .blob-1 { width: 500px; height: 500px; background: #99F6E4; top: -100px; left: -100px; }
        .blob-2 { width: 400px; height: 400px; background: #BBF7D0; bottom: -50px; right: -50px; }
        @keyframes floatBlob { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 50px) scale(1.1); } }

        /* --- HEADER PILL --- */
        header { width: 90%; max-width: 1200px; margin: 20px auto; padding: 12px 30px; border-radius: 100px; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; z-index: 100; box-shadow: 0 8px 32px rgba(0,0,0,0.03); }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo img { height: 32px; width: 32px; background: white; border-radius: 8px; padding: 3px; }
        .logo span { font-weight: 900; color: var(--primary); font-size: 1.2rem; }

        /* --- CHAT AREA --- */
        #chat-messages { flex-grow: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        #chat-messages::-webkit-scrollbar { width: 6px; }
        #chat-messages::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }

        .message-wrapper { margin-bottom: 24px; animation: slideUp 0.4s ease forwards; opacity: 0; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .message-content { max-width: 80%; padding: 16px 20px; border-radius: 24px; font-size: 0.95rem; line-height: 1.6; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        
        .user { display: flex; flex-direction: row-reverse; gap: 12px; }
        .user .message-content { background: var(--primary-gradient); color: white; border-bottom-right-radius: 4px; }
        
        .bot { display: flex; gap: 12px; }
        .bot .message-content { background: white; border: 1px solid #E2E8F0; border-bottom-left-radius: 4px; color: var(--text-main); }
        
        .avatar { width: 36px; height: 36px; border-radius: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
        .bot .avatar { background: var(--primary-gradient); color: white; }
        .user .avatar { background: #E2E8F0; color: #64748B; }

        /* --- INPUT AREA --- */
        .input-container { width: 90%; max-width: 900px; margin: 0 auto 30px; background: white; border-radius: 100px; padding: 8px 10px 8px 24px; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid #E2E8F0; transition: 0.3s; }
        .input-container:focus-within { border-color: var(--primary); box-shadow: 0 10px 30px rgba(13, 148, 136, 0.15); }
        #chat-input { flex-grow: 1; border: none; outline: none; padding: 10px 0; font-size: 1rem; background: transparent; resize: none; max-height: 150px; }
        .send-btn { width: 48px; height: 48px; border-radius: 50%; background: var(--primary-gradient); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .send-btn:hover:not(:disabled) { transform: scale(1.05) rotate(-10deg); box-shadow: 0 5px 15px rgba(13, 148, 136, 0.4); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- TYPING INDICATOR --- */
        .typing { display: flex; gap: 4px; padding: 10px 15px; background: #F1F5F9; border-radius: 20px; width: fit-content; margin-left: 48px; margin-bottom: 20px; }
        .dot { width: 6px; height: 6px; background: #94A3B8; border-radius: 50%; animation: bounce 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

        /* --- LIMIT OVERLAY (PREMIUM LOOK) --- */
        #limit-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); z-index: 200; display: none; align-items: center; justify-content: center; text-align: center; padding: 40px; }
        .limit-card { background: white; padding: 50px; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); max-width: 500px; border: 1px solid #E2E8F0; }
        .btn-premium { background: var(--primary-gradient); color: white; padding: 16px 32px; border-radius: 50px; text-decoration: none; font-weight: 800; display: inline-block; margin-top: 24px; box-shadow: 0 10px 20px rgba(13, 148, 136, 0.3); transition: 0.3s; }
        .btn-premium:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(13, 148, 136, 0.4); }

        /* Markdown Overrides */
        .prose p { margin-bottom: 0.5rem; }
        .prose code { background: #F1F5F9; padding: 2px 4px; border-radius: 4px; font-size: 0.9em; }
    
        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #0D9488; }

    </style>

    <link rel="stylesheet" href="../global-responsive.css?v=5">
</head>
<body>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Header -->
    <header>
        <a href="javascript:history.back()" class="logo">
            <img src="https://i.ibb.co/JWTx6WrX/FAVICON.png" alt="AIGEO">
            <span>AIGEO</span>
        </a>
        <a href="/auth.html" class="hidden md:block text-teal-600 font-bold text-sm bg-teal-50 px-5 py-2 rounded-full hover:bg-teal-100 transition">Đăng ký để học không giới hạn</a>
        <a href="index.html" class="md:hidden text-teal-600"><i data-feather="arrow-left"></i></a>
    </header>

    <!-- Chat Space -->
    <main id="chat-messages" class="max-w-4xl mx-auto w-full">
        <!-- Messages will appear here -->
    </main>

    <!-- Typing Indicator -->
    <div id="typing-indicator" class="max-w-4xl mx-auto w-full hidden">
        <div class="typing">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <!-- Input Box -->
    <div class="input-container max-w-4xl w-full">
        <textarea id="chat-input" rows="1" placeholder="Nhập câu hỏi về Địa lý..."></textarea>
        <button id="send-btn" class="send-btn">
            <i data-feather="send"></i>
        </button>
    </div>

    <!-- Limit Overlay -->
    <div id="limit-overlay">
        <div class="limit-card">
            <div class="w-20 h-20 bg-teal-100 text-teal-600 rounded-3xl flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-lock text-3xl"></i>
            </div>
            <h2 class="text-3xl font-black text-slate-900 mb-4">Hết lượt miễn phí</h2>
            <p class="text-slate-500 font-medium leading-relaxed">Bạn đã sử dụng hết 50 lượt hỏi đáp trong chế độ Khách. Hãy đăng ký tài khoản để tiếp tục trò chuyện và lưu lại lịch sử học tập nhé!</p>
            <a href="../auth.html" class="btn-premium">Đăng ký tài khoản ngay</a>
        </div>
    </div>

    <script src="../firebase-config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        document.addEventListener('DOMContentLoaded', async () => {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);

            const CHAT_LIMIT = 50;
            const chatMessages = document.getElementById('chat-messages');
            const chatInput = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-btn');
            const typingIndicator = document.getElementById('typing-indicator');
            const limitOverlay = document.getElementById('limit-overlay');
            
            let session = JSON.parse(localStorage.getItem('aigeo_client_session')) || { chatCount: 0 };
            let groqKeys = [];
            let chatHistory = [];

            feather.replace();

            // Tự động giãn textarea
            chatInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });

            function updateChatLimit() {
                const remaining = CHAT_LIMIT - (session.chatCount || 0);
                if (remaining <= 0) {
                    limitOverlay.style.display = 'flex';
                }
            }

            async function loadApiKeys() {
                const apiKeySnap = await getDoc(doc(db, "system_settings", "api_keys"));
                if (apiKeySnap.exists()) {
                    groqKeys = apiKeySnap.data().groq_keys || []; // Lấy mảng groq_keys
                }
            }

            // Cập nhật hàm lấy Key luân phiên từ mảng groqKeys
            function getNextApiKey() {
                if (groqKeys.length === 0) return null;
                let idx = parseInt(sessionStorage.getItem('orKeyIndex') || '0');
                sessionStorage.setItem('orKeyIndex', (idx + 1) % groqKeys.length);
                return groqKeys[idx];
            }

            function addMessage(text, role) {
                const isUser = role === 'user';
                const div = document.createElement('div');
                div.className = `message-wrapper ${isUser ? 'user' : 'bot'}`;
                
                div.innerHTML = `
                    <div class="avatar shadow-sm">
                        <i class="fas ${isUser ? 'fa-user' : 'fa-robot'}"></i>
                    </div>
                    <div class="message-content prose">
                        ${marked.parse(text)}
                    </div>
                `;
                
                chatMessages.appendChild(div);
                renderMathInElement(div);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            async function handleSend() {
                const text = chatInput.value.trim();
                if (!text || (session.chatCount >= CHAT_LIMIT)) return;

                chatInput.value = '';
                chatInput.style.height = 'auto';
                chatInput.disabled = true;
                sendBtn.disabled = true;
                typingIndicator.classList.remove('hidden');

                addMessage(text, 'user');
                chatHistory.push({ role: 'user', content: text });

                try {
                    const apiKey = getNextApiKey();
                    if (!apiKey) throw new Error("Chưa có API Key");

                    // THAY ĐỔI: Endpoint của Groq
                    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${apiKey}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            // THAY ĐỔI: Tên Model Llama 3.3 70B
                            model: "llama-3.3-70b-versatile",
                            messages: [
                                { 
                                    role: "system", 
                                    content: "Bạn là một trợ lý AI chuyên gia về Địa lý cho AIGEO. Trả lời câu hỏi của học sinh một cách ngắn gọn, chính xác, và đi thẳng vào vấn đề. Tuyệt đối không lặp lại câu hỏi hoặc dài dòng không cần thiết. Luôn trả lời bằng tiếng Việt. Sử dụng KaTeX cho công thức toán." 
                                },
                                ...chatHistory
                            ],
                            // Cấu hình tối ưu cho Groq
                            temperature: 0.7,
                            max_tokens: 2048
                        })
                    });

                    if (!response.ok) throw new Error("API Error");

                    const data = await response.json();
                    const aiText = data.choices[0].message.content;
                    
                    addMessage(aiText, 'assistant');
                    chatHistory.push({ role: 'assistant', content: aiText });
                    
                    session.chatCount++;
                    localStorage.setItem('aigeo_client_session', JSON.stringify(session));
                    updateChatLimit();

                } catch (e) {
                    console.error(e);
                    addMessage("Rất tiếc, trợ lý đang bận xử lý dữ liệu. Bạn hãy thử lại sau nhé!", "assistant");
                } finally {
                    typingIndicator.classList.add('hidden');
                    chatInput.disabled = false;
                    sendBtn.disabled = false;
                    chatInput.focus();
                }
            }

            sendBtn.onclick = handleSend;
            chatInput.onkeydown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            };

            updateChatLimit();
            await loadApiKeys();
            addMessage("Chào bạn! Tôi là trợ lý AI của AIGEO. Bạn cần tôi giải đáp thắc mắc gì về Địa lý hôm nay không?", "assistant");
        });
    </script>

<script type="text/javascript">
    // 1. Chặn Chuột phải (Để ẩn menu "Inspect/Kiểm tra" và "View Source/Xem nguồn")
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        // Không hiện thông báo gì cả để trải nghiệm mượt mà hơn
    });

    // 2. Chặn các phím tắt Developer Tools
    document.addEventListener('keydown', function(e) {
        // Chặn F12
        if (e.key === 'F12' || e.keyCode === 123) {
            e.preventDefault();
            return false;
        }

        // Chặn các tổ hợp phím Ctrl + ...
        if (e.ctrlKey) {
            switch (e.key.toLowerCase()) {
                case 'u': // Chặn Ctrl + U (Xem source code)
                case 's': // Chặn Ctrl + S (Lưu trang web)
                case 'p': // Chặn Ctrl + P (In trang web - thường hiện code)
                // Lưu ý: KHÔNG chặn 'c' (Copy) và 'a' (Select All)
                    e.preventDefault();
                    return false;
            }

            // Chặn Ctrl + Shift + ... (Các phím mở DevTools)
            if (e.shiftKey) {
                switch (e.key.toLowerCase()) {
                    case 'i': // Inspect Element
                    case 'j': // Console
                    case 'c': // Element Inspector
                        e.preventDefault();
                        return false;
                }
            }
        }
    });
</script>
<script type="module" src="../notifications.js"></script>
</body>
</html>
