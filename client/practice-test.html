<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://i.ibb.co/JWTx6WrX/FAVICON.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGEO - Đang làm bài</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/src/main.css">
    <script src="https://unpkg.com/feather-icons"></script>
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <link rel="stylesheet" href="/src/css/client/practice-test.css">
</head>
<body>

    <header>
        <div class="flex items-center gap-4 flex-1">
            <img id="user-avatar" class="h-10 w-10 rounded-xl" src="https://ui-avatars.com/api/?name=Guest&background=0D9488&color=fff" alt="Avatar">
            <div>
                <h1 id="test-name-header" class="font-black text-slate-800 leading-tight">Đang tải...</h1>
                <p id="user-name" class="text-xs font-bold text-slate-400">Chế độ Khách</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="timer-pill">
                <i class="far fa-clock text-teal-600"></i>
                <span id="timer">00:00</span>
            </div>
            <label for="question-map-toggle" class="md:hidden p-2 bg-slate-100 rounded-lg cursor-pointer">
                <i data-feather="grid"></i>
            </label>
        </div>
        <div class="progress-container">
            <div id="progress-bar" style="width: 0%"></div>
        </div>
    </header>

    <div class="main-layout">
        <main class="content-scroll">
            <div class="max-w-3xl mx-auto" id="main-content-area">
                <div class="text-center py-20">
                    <div class="animate-spin rounded-full h-12 w-12 border-4 border-teal-500 border-t-transparent mx-auto"></div>
                    <p class="mt-4 text-slate-400 font-bold">Đang chuẩn bị câu hỏi...</p>
                </div>
            </div>
        </main>

        <input type="checkbox" id="question-map-toggle" class="hidden">
        <aside id="question-map">
            <h2 class="font-black text-slate-800 mb-6 flex justify-between items-center">
                Danh sách câu hỏi
                <span id="progress-text" class="text-xs bg-teal-50 text-teal-600 px-2 py-1 rounded-md">0/0</span>
            </h2>
            <div id="question-grid" class="question-grid"></div>
            <button id="submit-btn" class="btn-submit">Nộp bài ngay</button>
        </aside>
    </div>

    <script type="module" src="../firebase-config.js"></script>
    <script type="module" src="/src/js/client/practice-test.js"></script>


</body>
</html>
